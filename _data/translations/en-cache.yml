  272406ef685aec140fa99bfa80f1d36dac860df435a7aff0c9f6e0bcf96c9a55:
    source_text: 'i et par stormer vinteren 2021/22. Dessverre somlet Storebrand noe
      voldsomt med å sende opp en takstmann, og takstmann Jørn Halvorsen kom seg først
      opp i mai, vel 4 måneder etter skaden hadde skjedd. Innen han hadde skrevet
      en rapport var det for sent å bestille tømrere til å gjøre jobben: den skjedde
      først i september, og da var det for sent å legge torva. Den fikk jeg lagt'
    translated_text: 'during a couple of storms in the winter of 2021/22. Unfortunately,
      Storebrand took an awfully long time to send an appraiser, and appraiser Jørn
      Halvorsen didn’t arrive until May—a good four months after the damage had occurred.
      By the time he had written a report, it was too late to hire carpenters to do
      the job: it didn’t happen until September, and by then it was too late to lay
      the turf. I had it laid'
    format: text
    updated_at: '2026-03-31T08:36:59Z'
  e53464db39a9a34c163c22ce3dbbb11b99b839c276baa1429c7bdd28a56c63c4:
