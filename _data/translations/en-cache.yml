  8c6cf167e972d694f7f14b2988f6ab43716f990bbb480626b0bcf600d995240a:
    source_text: Tok en tur inn til hytte med rørlegger i dag og fikk fikset vannet!
      Viste seg at det var et sprukket rør som gjorde at pumpa dra inn “falsk luft”.
      Det må ha utvidet seg i vinter, men må også ha vært der i årevis. Når vi først
      byttet røret ble det liv i kranen med en gang! Null venting og trøbbel. Dette
      lover bra :-)
    translated_text: I went up to the cabin with a plumber today and got the water
      problem fixed! It turned out there was a cracked pipe that was causing the pump
      to suck in “false air.” It must have expanded over the winter, but it must have
      been there for years. As soon as we replaced the pipe, the faucet started working
      again right away! No more waiting or trouble. This bodes well :-)
    format: text
    updated_at: '2026-03-31T08:36:50Z'
