  da4420e82183120ae6cdea1f082e991f5c9fa341d72b8c58ba0c6d089ee51aa7:
    source_text: To skritt tilbake
    translated_text: Two steps back
    format: text
    updated_at: '2026-03-31T08:36:57Z'
  6d1c48e18ee52c3af5b9def753330aaea8a01d3c7fc2336b49d90f900de51822:
    source_text: Skulle bare opp en tur med Fredrik og fylle på diesel og vann før
      vinteren, men måtte returnere med uforrettet sak. Wallas-en nekter å starte
      og vannpumpa er gåen. I tillegg hadde noen glemt å tømme vann i springen og
      hatt i frostvæske i slukene, så det var litt ukul stemning denne gangen.
    translated_text: I was just supposed to go out for a quick trip with Fredrik to
      fill up on diesel and water before winter, but I had to come back empty-handed.
      The Wallas won’t start, and the water pump is broken. On top of that, someone
      had forgotten to drain the water from the faucets and put antifreeze in the
      drains, so things were a bit tense this time.
    format: text
    updated_at: '2026-03-31T08:36:57Z'
