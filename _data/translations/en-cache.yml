  361b2410950b617c9a6dbeacf184c2988b63af293c46f045f370c264b98f2e2e:
    source_text: Det korte svaret er ja. Vi har en frostfri tank under hytta, og så
      lenge det er vann i den er det vann i springen. Det kan selvsagt gå tomt, men
      det går måneder mellom hver gang. Tanken har varmekabler på røret, men de må
      settes på ved ankomst av deg (se under vasken), ettersom batteriene ellers vil
      tappes ned.
    translated_text: The short answer is yes. We have a frost-proof tank under the
      cabin, and as long as there is water in it, there will be water in the tap.
      Of course, it can run out, but it takes months between each time. The tank has
      heating cables on the pipe, but you must turn them on when you arrive (see under
      the sink), otherwise the batteries will run down.
    format: text
