  c1eccdfd01bc96568a2c0f19e344fe21259009f746f73d0087a475ef18684101:
    source_text: Ikke helt fram til hytta, men minst halve veien, avhengig av om man
      går fra Skallandslia/Bjørnerudsæter eller Tempelseter. De oppkjørte løypene
      er under ti minutter rolig skigange fra hytta. Se kartsiden for løypestatus
      m.m.
    translated_text: Not all the way to the cabin, but at least halfway, depending
      on whether you start from Skallandslia/Bjørnerudsæter or Tempelseter. The groomed
      trails are less than a ten-minute leisurely ski from the cabin. See the map
      page for trail conditions and more.
    format: text
    updated_at: '2026-03-31T08:37:09Z'
  60575760cd988bf6d037c51deb7c98f23622adc98d8740470c9866bce722b243:
    source_text: Bør man gå på ski fra Tempelseter eller parkeringsplassen på Bjørnerudsæter?
    translated_text: Should you start skiing from Tempelseter or the parking lot at
      Bjørnerudsæter?
    format: text
    updated_at: '2026-03-31T08:37:09Z'
  aecae28a0356cc5716b2f50340c171727296c9ae78be1b267adf4930fe7788ed:
    source_text: Bjørnerudsæter er halve avstanden av Tempelseter, så definitivt førstnevnte.
      Likevel ... vinterstid anbefaler jeg de som ikke har vært på hytta før å benytte
      seg av snøskutertransport. Det blir tidlig mørkt og det er greit å ha snøskuterspor
      å følge (om det ikke er plass på sleden).
    translated_text: Bjørnerudsæter is half the distance from Tempelseter, so definitely
      the former. Still... in winter, I recommend that those who haven't been to the
      cabin before use snowmobile transport. It gets dark early, and it's nice to
      have snowmobile tracks to follow (if there's no room on the sled).
    format: text
    updated_at: '2026-03-31T08:37:09Z'
  a0f98ed9ffd4b76f3d106eba9660bc82258b47676d66e899dd3fb0ab5a7346ec:
