  848f2bd4f775f11750523654c3a6c93966fa69f4ac592ad60151a9514be55218:
    source_text: Da har vi fått ytterligere to gassovner på hytta, som bringer totalen
      opp i fire gassovner. Med 4x4kW varme blir det kjapt varmt i bingen!
    translated_text: We’ve now added two more gas heaters to the cabin, bringing the
      total to four. With 4x4 kW of heat, the cabin heats up in no time!
    format: text
    updated_at: '2026-03-31T08:36:45Z'
  5ef47fb0bc5eae5c2280d8676faf041c35adb05b859bf718294c55db23bb30f5:
    source_text: Fikk også transportert inn parafin og ryddet ordentlig opp i boden.
      Endelig fikk jeg brukt alle plastkassene jeg har transportert opp og så ryddig
      tror jeg det aldri har vært i vedboden! Skjønte også at de ti sekstiliterssekkene
      jeg fikk kjørt inn tidligere ikke helt monnet. De fylte bare opp 1/4 av boden
      … Her må vi nok kjøre flere omganger nærmere påske.
    translated_text: I also managed to bring in the kerosene and really tidy up the
      shed. I finally got to use all the plastic crates I’ve hauled up, and I don’t
      think the wood shed has ever been this tidy! I also realized that the ten 60-liter
      bags I brought in earlier weren’t quite enough. They only filled up 1/4 of the
      shed… We’ll probably have to make a few more trips closer to Easter.
    format: text
    updated_at: '2026-03-31T08:36:45Z'
  3787b777bb00931d6bfe2db83e9948209505a728c14c1b292249bb8074ef48e1:
    source_text: Dessverre hadde aggregatet gått fløyten etter siste utleie, og det
      må nok til reparasjon. Ser ut som det var kjørt uten olje, og lyden var ikke
      så veldig tillitsvekkende :-/
    translated_text: Unfortunately, the generator broke down after the last rental,
      and it will probably need to be repaired. It looks like it was run without oil,
      and the sound it made wasn't very reassuring :-/
    format: text
    updated_at: '2026-03-31T08:36:45Z'
  a3da622279c50c6ac257fe64f2fdb8c19dbcac57c771f05effb714b048814d49:
    source_text: En deilig ting jeg fikk endelig ordnet opp i var kablingen av batterikablene.
      Endelig så det litt mer profesjonelt ut - ingen flere løse kabler som er håndtvunnet
      rundt en bolt! Fatteren hadde nok vært fornøyd.
    translated_text: One nice thing I finally got sorted out was the routing of the
      battery cables. It finally looked a bit more professional—no more loose cables
      wrapped by hand around a bolt! My dad would have been pleased.
    format: text
    updated_at: '2026-03-31T08:36:45Z'
