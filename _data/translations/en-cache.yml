  c2900ae6fbf7c7d510962c393db7d9e8824c05f021d32264fd7e60c649d5a06e:
    source_text: Parafinkaminen ("Wallasen") er ikke koblet på hovedtanken. Denne
      gir jevn varme uten eksos og kan stå på døgnet rundt, men du må hente en ny
      dieselkanne under hytta (kjellerinngang under hovedsoverommet).
    translated_text: The paraffin heater ("Wallasen") is not connected to the main
      tank. It provides steady heat without emissions and can be left on 24/7, but
      you’ll need to fetch a new can of diesel from under the cabin (the basement
      entrance is located under the master bedroom).
    format: text
