  62e3670039542adbc522a6e11a5ab51c4af0abb37ec68117fe170a243103ca61:
    source_text: 'Denne siden skal etter hvert inneholde alt av informasjon om Holmevann,
      både en liten prosjektblogg om hvordan ting på hytta endrer seg, og hva vi holder
      på å fikse for tiden (inkludert alle utfordringene), men viktigere:'
    translated_text: 'This page will eventually contain all the information about
      Holmevann, including a short project blog about how things are changing at the
      cabin and what we’re currently working on (including all the challenges), but
      more importantly:'
    format: text
    updated_at: '2026-03-31T08:36:44Z'
  e8de0f05f05e9be87646af790b38411f6dcf28beb041dcbab35146148a8ff0ea:
    source_text: all informasjon man måtte trenge for å bruke hytta
    translated_text: all the information you might need to use the cabin
    format: text
    updated_at: '2026-03-31T08:36:44Z'
  205b161fa5b30e56b2e9425985b68ab8629fff7e678ac4ae948295c3556f1750:
    source_text: "(selv om man ikke har vært der før)."
    translated_text: "(even if you've never been there before)."
    format: text
    updated_at: '2026-03-31T08:36:44Z'
  6a47d1f54dc6c2075fba2c40a6c7ebe268afb9e957254f6284d6f4c9eb805bf5:
    source_text: Bakgrunnen for denne siden er nettopp at informasjonen om hytta er
      for fragmentert, med noe informasjon på AirBnB, noe i Dropbox, noe i Evernote,
      noe på Google Maps, og noe i Google Drive. Og alt lenket på kryss og tvers i
      en salig røre.
    translated_text: The reason for this page is precisely that the information about
      the cabin is too scattered—some of it is on Airbnb, some in Dropbox, some in
      Evernote, some on Google Maps, and some in Google Drive. And everything is linked
      all over the place in a complete mess.
    format: text
    updated_at: '2026-03-31T08:36:44Z'
  3be31f4cdafb9cf42be06457524f1d0f6f8cfaaac1434a717dd98d6791608929:
    source_text: Jeg kommer til å starte veldig enkelt, men med tiden håper jeg å
      ha en “bruksanvisning” som vil fungere som en offline-app man kan lagre på telefonen
      før besøk på hytta, og som man dermed kan referere til når man måtte komme over
      utfordringer.
    translated_text: I’m going to start off very simply, but over time I hope to have
      a “user guide” that will function as an offline app you can save on your phone
      before visiting the cabin, and which you can then refer to whenever you encounter
      any challenges.
    format: text
    updated_at: '2026-03-31T08:36:44Z'
