  706f0d3af648e66c18bcb64cfb35a57c90a51f9c84de48033ab2bfd4b3e91391:
    source_text: I lang tid har vi derfor planlagt å få satt opp en liten vindgenerator
      som kan generere strøm i den perioden det ikke er nok sol. Sommerstid er det
      lite vind og mye sol, og vinterstid er det mye vind og lite sol. I tillegg genererer
      den strøm når solen er gått ned.
    translated_text: For a long time, we have therefore been planning to install a
      small wind turbine that can generate electricity during periods when there isn’t
      enough sunlight. In the summer, there is little wind and plenty of sunshine,
      and in the winter, there is plenty of wind and little sunshine. In addition,
      it generates electricity after the sun has set.
    format: text
    updated_at: '2026-03-31T08:36:50Z'
  ffe39d51844eac98dd504525b48df535f0179886023c87401c28dabf7098de46:
    source_text: Sol og vind er altså en perfekt kombinasjon der de komplementerer
      hverandres svakheter og styrker. Vi hadde gjort mye research, og fikk kjøpt
      inn en Rutland 910, som har den gunstige kombinasjonen av å være kjempestille
      og utrolig robust. Når det blåser hardt vil den automatisk vippe seg selv sidelengs
      så den ikke blir skadet av vinden. Og kraftig vind har vi nok av på høyfjellet!
    translated_text: Sun and wind are, in other words, a perfect combination, as they
      complement each other’s weaknesses and strengths. We had done a lot of research
      and ended up buying a Rutland 910, which offers the ideal combination of being
      extremely quiet and incredibly sturdy. When the wind blows hard, it automatically
      tilts sideways to prevent damage from the wind. And we have plenty of strong
      winds up in the high mountains!
    format: text
    updated_at: '2026-03-31T08:36:50Z'
  be18aba2b6646db178952d93d0e1cde842476087cc3f442801b58a99e052c253:
    source_text: 'Så i desember 2018 fikk jeg kjørt inn vindgenerator, 6m stålrigg
      og ny regulator med tanke på å sette det opp til sommeren. Dette kunne bli bra!
      Men jeg er også lovlydig, og var klar over at en slik installasjon var søknadspliktig
      - uansett hvor lite synlig. Området er nemlig regulert til LNF2 i Sigdals kommuneplan,
      hvilket innebærer meget strenge begrensninger: essensielt fullt byggeforbud.
      Vi håpet jo at man ville se at det var gunstig å bytte ut bråkete aggregatkjøring
      i fjellheimen med et stille og nesten usynlig alternativ, men i juli uttalte
      Fylkesmannen i Viken seg klart negativt til søknaden vår. De mente at det ville
      gi en presedens-virkning som kunne medføre en økning av flaggstenger o.l. på
      hytter i kommunen, noe som ville øke den privatiserende effekten. Dette var
      ikke noe avslag i seg selv, men signalet til kommunen var såpass sterkt at vi
      skjønte det ikke var noen vits å gå videre med dispensjasjonen til behandling
      i kommunestyret - noe som ville kostet oss nesten 25 tusen kroner. Så vi trakk
      søknaden.'
    translated_text: 'So in December 2018, I had a wind generator, a 6-meter steel
      mast, and a new controller delivered, with the intention of setting it up by
      summer. This could turn out great! But I’m also law-abiding, and I was aware
      that such an installation required a permit—no matter how inconspicuous it might
      be. The area is zoned as LNF2 in Sigdal’s municipal plan, which entails very
      strict restrictions: essentially a complete ban on construction. We had hoped
      that they would see the benefits of replacing noisy generator operation in the
      mountain wilderness with a quiet and nearly invisible alternative, but in July,
      the County Governor of Viken issued a clear rejection of our application. They
      believed it would set a precedent that could lead to an increase in flagpoles
      and similar structures at cabins in the municipality, which would exacerbate
      the privatizing effect. This was not a rejection in itself, but the signal to
      the municipality was so strong that we realized there was no point in proceeding
      with the exemption for consideration by the municipal council—which would have
      cost us nearly 25,000 kroner. So we withdrew the application.'
    format: text
    updated_at: '2026-03-31T08:36:50Z'
  8a370d5df568edaf1c5c8c0a3bfe552523e6185c4258b6d35ae41dd3e92b0046:
    source_text: Vindkraft; adieu. Stort aggregat; velkommen
    translated_text: Wind power; farewell. Large generator; welcome
    format: text
    updated_at: '2026-03-31T08:36:50Z'
  23bb02cfb7dc941601f534d953be7a5847ad2d57c6d7d39a18760eb4cdf2bbf9:
    source_text: Det var leit at Fylkesmannen ikke så at dette var et positivt miljøtiltak,
      hvilket gjør at vi måtte finne andre måter å løse problemet med å ikke ha nok
      energi. Så nå har vi gått til innkjøp av et brukt Honda EU 30is aggregat med
      fjernstart - 3x kraftigere enn vårt gamle. I tillegg har jeg anskaffet et ekstra
      Concorde Sun Xtender PVX-2580L. Da har vi forhåpentligvis doblet batterikapasiteten
      også, som bør hjelpe.
    translated_text: It was unfortunate that the County Governor didn’t recognize
      this as a positive environmental measure, which meant we had to find other ways
      to solve the problem of not having enough power. So now we’ve purchased a used
      Honda EU 30is generator with remote start—three times more powerful than our
      old one. In addition, I’ve acquired an extra Concorde Sun Xtender PVX-2580L.
      Hopefully, this has doubled our battery capacity as well, which should help.
    format: text
    updated_at: '2026-03-31T08:36:51Z'
