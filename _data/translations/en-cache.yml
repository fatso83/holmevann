  43fcabc3ef8357696628a8e833bbd52c530cf1e0853be2c64956d0e233bfb129:
    source_text: "! Tidligere måtte man tatt av seg på beina eller bli riktig våt,
      men nå er det altså en solid bro, festet til fjell, som lar en krysse på det
      smaleste uten å måtte hoppe fra stein til stein."
    translated_text: "! In the past, you had to wade through the water or get thoroughly
      soaked, but now there’s a sturdy bridge, anchored to the rock face, that lets
      you cross at the narrowest point without having to hop from rock to rock."
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  b003390f8e658d692f780963d8c2a1317de545c6129abd02e684780384dcc55a:
    source_text: "Nærmeste sikre krysningspunkt er ellers et kvarters gange lenger
