  cf9a9ec0d5d10d3346760bc4be758999fb8a61c53175475fe816841f321b44f9:
    source_text: Kan man dusje? Hvordan håndterer man hygiene?
    translated_text: Can you take a shower? How do you handle hygiene?
    format: text
    updated_at: '2026-03-31T08:37:08Z'
  41ea18f46da9f3d8ffaf8bd4303844b9cca1321f69166bb2d961720639f45085:
    source_text: Det er ikke noe problem å holde seg ren og velduftende på hytta;
      klut og såpevann får en langt :) Anbefaler å ta med en klut og et håndklede
      per person. Klut til kroppsvask etter tur (kok opp en kjele vann og ha i vasken),
      og ett til å tørke kroppen med.
    translated_text: It’s no problem to stay clean and fresh at the cabin; a washcloth
      and soapy water will take you a long way :) I recommend bringing one washcloth
      and one towel per person. Use one washcloth to wash your body after a hike (boil
      a pot of water and pour it into the sink), and another to dry off with.
    format: text
    updated_at: '2026-03-31T08:37:08Z'
  da399768742a45087c5c75a31ee09810c830fe00911f024f5e2df58428744e3c:
    source_text: Det er dusj på stedet, men det er noen praktiske begrensninger ...
      Det innebærer at man må koke opp vann på forhånd, blande til passe temperatur
      i 10l bøtter og dusje kjapt. Sjeldent man gidder det på en helgetur, men i påsken
      blir det alltid en dusj :)
    translated_text: There’s a shower on site, but there are a few practical limitations...
      This means you have to boil water in advance, mix it to the right temperature
      in 10-liter buckets, and take a quick shower. You rarely bother with that on
      a weekend trip, but during Easter, we always take a shower :)
    format: text
    updated_at: '2026-03-31T08:37:08Z'
