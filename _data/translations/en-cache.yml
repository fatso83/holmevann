  81f139119dc246eeee3c9939521f614e8b6fea0a64a399c004a461ce6267a7d0:
    source_text: 'Det eneste som ikke er fit for fight er meg selv: første dag av
      våre planlagte to uker i fjellet greide jeg å ryke korsbåndet, skade et leddbånd
      og menisken og dermed gjøre meg selv helt ubrukelig. Vaktmester Kopseng ser
      dermed ikke ut til å kunne passe på hytta framover - akkurat i det det meste
      var på stell … Ser meg derfor nødt til å begrense utleie'
    translated_text: 'The only one who isn’t fit for action is me: on the first day
      of our planned two weeks in the mountains, I managed to tear my cruciate ligament,
      injure a ligament and the meniscus, and thus render myself completely useless.
      Caretaker Kopseng therefore doesn’t look like he’ll be able to look after the
      cabin going forward—just when everything was mostly in order… I therefore feel
      compelled to limit rentals'
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  1ac8ba2aabce56363f9cf109aede465bd333e8b03416d3b8d62b11af17e1137d:
    source_text: igjen
    translated_text: again
    format: text
    updated_at: '2026-03-31T08:37:01Z'
  b99efda999324fc6011efa921819d75a0387dd7e996ef56c0ba13873a073eda3:
    source_text: ettersom jeg kommer til å måtte operere kneet i høst og dermed vil
      være ute av spill til langt ute i 2026.
    translated_text: since I’ll be having knee surgery this fall and will therefore
      be sidelined well into 2026.
    format: text
    updated_at: '2026-03-31T08:37:01Z'
  ca99cc1b8ccf259ec578d8b477656237c0cb9b4d35f21b8369b81a9604fea0f3:
    source_text: Jeg antar jeg kan få tatt en liten tur inn på senvinteren 2026, slik
      at noen kan være her i påsken, men ellers stenger jeg for utleie ut juni 2026
      inntil jeg ser hvordan det går med kneet.
    translated_text: I suppose I can take a short trip in late winter 2026 so that
      someone can stay here over Easter, but otherwise I’ll stop renting it out through
