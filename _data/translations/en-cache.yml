    source_text: Vi har en parkeringsplass i Skallandslia i Eggedal, ca tre kvarters
      gange fra hytta. Den er tilgjengelig hele året og det måkes hyppig der vinterstid.
      Se
    translated_text: We have a parking lot in Skallandslia in Eggedal, about a 45-minute
      walk from the cabin. It is accessible year-round and is frequently plowed during
      the winter. See
    format: text
    updated_at: '2026-03-31T08:37:15Z'
  42d996b766ac2615d02d440c1c1b299d06940a7ea6a0fcc8d31cdd761bac02e9:
