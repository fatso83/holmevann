    source_text: "#båt"
    translated_text: "#boat"
    format: text
    updated_at: '2026-03-31T08:36:57Z'
  cd72132fd20bb4a71e239bd39eb3a74c171dad0fc3fef8a8ce8456e0e6be543f:
    source_text: Har i samme slengen båret inn en “ny” støvsuger, ettersom den trådløse
      jeg skaffet i sommer var tilnærmet verdiløs. Skjønner ikke hvorfor Power selger
      elektrosøppel!
    translated_text: While I was at it, I picked up a “new” vacuum cleaner, since
      the cordless one I bought this summer was practically useless. I don’t understand
      why Power sells junk!
    format: text
    updated_at: '2026-03-31T08:36:57Z'
  60468623cedf418b157619b0cd7219be00f71b76cb693408162e2040a3aab7cf:
    source_text: Deilig og se at gresset vi sådde i juli gror fint, men jeg ser at
      det nok kunne vært fordelt litt bedre ut til kantene …
    translated_text: It’s lovely to see that the grass we sowed in July is growing
      nicely, but I can see that it could have been spread out a little better toward
      the edges …
    format: text
    updated_at: '2026-03-31T08:36:57Z'
  8b8e7e69423d2b288f324ab2eabc30abf724ed6cb49518c728d646699f798ea0:
