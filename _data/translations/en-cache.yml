  ae6b7c4fbf8a598dc621232efae9c38169fdfa200cd17dee9a869bfd4c9af4db:
    source_text: "Du kan altså la laderen ligge igjen i bilen, men ta med en ekstra
      kabel om dere er mange \U0001F642 Strømmen kommer fra solcellepaneler. I de
      mørkeste vintermånedene kan det bli smått med lading både pga snø på panelene
      og lite sol. Da er det kjekt at et kraftig Honda-aggregatet kan lade batteriene!
      I praksis har vi aldri trengt å fyre det opp, så lenge man feier bort snøen!"
    translated_text: "So you can leave the charger in the car, but bring an extra
      cable if there are a lot of you \U0001F642 The power comes from solar panels.
      During the darkest winter months, charging can be limited due to both snow on
      the panels and lack of sunlight. That’s when it’s handy to have a powerful Honda
      generator to charge the batteries! In practice, we’ve never had to fire it up,
      as long as you clear the snow away!"
    format: text
