  '08e493a6f2afa5209957e8a1d1268657902353d7d55fa5cb0dad3e82bce9c563':
    source_text: ". Vi har selv vært gjennom småbarnsfasen på hytta, og har derfor
      litt av hvert for å dekke behovene. Det er badebalje og stellematte. Det er
      også noen bleier om man går tom. Om man er redd for kombinasjonen av barnehender
      og varmekilder så er det greit å vite at vi har en lekegrind. Grinda har vi
      satt rundt peisovnenen i steden for barna. Ellers må man bare være litt påpasselig,
      avhengig av barnets alder. Fyr i gassovnene på morgenen før barna krabber rundt,
      f.eks."
    translated_text: ". We’ve been through the toddler phase at the cabin ourselves,
      so we have a bit of everything to meet your needs. There’s a baby bath and a
      changing mat. There are also some diapers in case you run out. If you’re worried
      about the combination of little hands and heat sources, it’s good to know that
      we have a playpen. We’ve set up the playpen around the wood-burning stove for
      the kids. Otherwise, you just need to be a little careful, depending on the
      child’s age. Light the gas stoves in the morning before the kids start crawling
      around, for example."
    format: text
