  d4cecf65252c76deeb6d0f911b7437ba56899af3e9bcdfad014bdd9433a68581:
    source_text: Vinteren 2023/2024 begynte jeg å undersøke muligheten for å få en
      smoothere måte å fylle på vann vinterstid på hytta. Opprigging av pumper, vannslanger,
      m.m. vinterstid var ganske strevsomt og vi hadde etterhvert samlet mye “morsomme”
      (#fail) historier. Jeg ville ha noe som andre kunne greie å fylle opp vinterstid
      også, uten alt for mye innsats og styr.
    translated_text: In the winter of 2023/2024, I started looking into ways to make
      refilling the water supply at the cabin during the winter a bit easier. Setting
      up pumps, water hoses, and so on during the winter was quite a hassle, and over
      time we’d accumulated quite a few “funny” (#fail) stories. I wanted something
      that others could also manage to fill up during the winter, without too much
      effort or hassle.
    format: text
    updated_at: '2026-03-31T08:37:03Z'
