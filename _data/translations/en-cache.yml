  e11aa7f34f1f08bb46dabaf89ae93bf43235b817f4f2998fea5462c1de2aeed2:
    source_text: Det går fint an å komme seg til hytta, men det tar lenger tid og
      du bør antagelig justere lengden på oppholdet ditt for å matche busstider. Det
      vanligste er da taxi fra Eggedal og opp, men du kan velge å gå sti de 5-6 km
      opp til Åssetra (fin tur - ca 2 timer). Det var slik min far kom seg dit på
      femtitallet :-)
    translated_text: It’s perfectly possible to get to the cabin, but it takes longer,
      and you’ll probably need to adjust the length of your stay to match the bus
      schedule. The most common option is to take a taxi from Eggedal and up, but
