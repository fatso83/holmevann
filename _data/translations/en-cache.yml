  4226e5a0ef09531b36fb3344963b712c982a5aace5d6476f9c5411d10c1d0fea:
    source_text: Problemene oppstod da det ble kaldt i en halvtom tank. Det er akkurat
      da det utvikles mest kondens, som igjen fører til et vannskikt i tanken. Etter
      å hatt i en liter isopropanol (som binder vann til diesel-en og tar bort vannskiktet)
      kjørte jeg noen omstarter, og på den fjerde runden fyrte den endelig opp!
    translated_text: The problems started when it got cold in a half-empty tank. That’s
      exactly when the most condensation forms, which in turn leads to a layer of
      water in the tank. After adding a liter of isopropanol (which binds water to
      the diesel and removes the water layer), I tried restarting it a few times,
      and on the fourth try, it finally started up!
    format: text
    updated_at: '2026-03-31T08:36:58Z'
