  57dea67a0eb0033a780a5a24ba082664ac013ee0cf196d90c7282ce8aed46613:
    source_text: 'Fra hytta ble bygget i 1994 og fram til personsøkernettet ble skrudd
      av i 1997 hadde vi “Ring hytta varm”-funksjon på Wallas-en. Vanlig mobilnett
      rakk ikke fram. Rundt 2024 begynte “LTE-M”-løsninger å dukke opp: LTE (4G) som
      kjører på det gamle 450 MHz mobilnettet og trenger mye dypere inn i fjellheimen.'
    translated_text: 'From the time the cabin was built in 1994 until the pager network
      was shut down in 1997, we had a “Call the Cabin” feature on the Wallas. Regular
      cell service didn’t reach that far. Around 2024, “LTE-M” solutions began to
      emerge: LTE (4G) running on the old 450 MHz cellular network, which penetrates
      much deeper into the mountainous terrain.'
    format: text
    updated_at: '2026-03-31T08:37:01Z'
  2be971ddf87099536c5b07e8e3ee24698860fa1a07f156fa75db3830e2b64da4:
    source_text: Parafinkaminen vår fra finske Wallas er perfekt når den funker. De
      siste 5-6 årene har den derimot vært lite samarbeidsvillig, men i 2024/25 ble
      den bygget om innvendig (nytt kretskort, brenner, ++) slik at den 20 år gamle
      ovnen essensielt er elektronisk lik en ny ovn. Det muliggjør “Ring hytta varm”
      ved hjelp av en Sikom-boks jeg har kjøpt inn. Jeg koblet alt opp etter bruksanvisningen
      i sommer, men … det funka ikke. Jeg skal prøve igjen til sommeren.
    translated_text: Our paraffin stove from the Finnish company Wallas is perfect
      when it works. Over the past 5–6 years, however, it hasn’t been very cooperative,
      but in 2024/25 it was refurbished internally (new circuit board, burner, etc.)
      so that the 20-year-old stove is essentially electronically equivalent to a
      new one. This enables “Ring hytta varm” using a Sikom box I purchased. I hooked
      everything up according to the manual this summer, but… it didn’t work. I’ll
      try again next summer.
    format: text
    updated_at: '2026-03-31T08:37:01Z'
