      ERROR” on the display, but everyone has figured that out on their own. In case
      that happens now, I have a backup solution—which, among other things, has been
      used when the toilet was being serviced. Under the cabin, by the outhouse, we
      have a Dometic camping toilet that works perfectly—even with a lot of people.
