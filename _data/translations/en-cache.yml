  9abf4cb335c08239f91fbd9b437aa409c02a81c34e115ec4a3be3fb37e35f508:
    source_text: "De regulerbare varmekablene står det at bare skal dra 10W/m, men
      det var bare i fantasien! Ved oppstart hadde de så lav motstand at de dro 5-6
      kW. Jeg måtte bruke aggregat for å håndtere oppstarten og bytte til strøm fra
      hytta etterpå. Da dro de 1200 watt kontinuerlig \U0001F92F Etter den erfaringen
      og etter å ha sjekket litt grunnleggende Ohms-lover ("
    translated_text: "The adjustable heating cables are supposed to draw only 10W/m,
      but that was just a fantasy! At startup, their resistance was so low that they
      drew 5–6 kW. I had to use a generator to handle the startup and switch to power
      from the cabin afterward. Then they drew 1200 watts continuously \U0001F92F
      After that experience and after checking some basic Ohm’s laws ("
    format: text
