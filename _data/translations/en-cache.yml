  c12ad07943711207c31a4b718e90ab5baaf48466f1cd3bd08f2d98b8a36ac7dd:
    source_text: Kan man få snøskutertransport?
    translated_text: Is snowmobile transportation available?
    format: text
    updated_at: '2026-03-31T08:37:09Z'
  d767bf04a1ddd28d5c86009a8487245b4e76813bdddd7cf8e0a2716aa58187e7:
    source_text: Ja, kan bli kjørt inn så lenge det er nok snø (typisk sent desember).
      Anbefaler dette spesielt om man har mye å bære på eller har planer om å være
      i Eggedal etter 17:30 (det blir alltid senere enn du tror). Jeg setter deg i
      kontakt med en løyvehaver. Kostnad ca 800kr hver vei. Vanligvis kan man få skyss
      fra den vanlige parkeringsplassen på Bjørnerudsæter, men om han ikke har mulighet
      har jeg en annen kar som kjører fra Tempelseter, som er utgangspunktet for løypemaskinene.
      Det er kortere fra Bjørnerudsæter, så kostnaden er ca 600 kr derfra vs rundt
      tusenlappen fra Tempelseter. Dette er veilendende per 2023. Tur-retur er billigere
      enn dobling. (typisk 1500 t/r vs 1000 en vei for Tempelseter)
    translated_text: Yes, you can get a ride as long as there’s enough snow (typically
      late December). I especially recommend this if you have a lot to carry or plan
      to stay in Eggedal past 5:30 p.m. (it always runs later than you think). I’ll
      put you in touch with a trail owner. Cost approx. 800 NOK each way. Usually,
      you can get a ride from the regular parking lot at Bjørnerudsæter, but if he’s
      unavailable, I have another guy who drives from Tempelseter, which is the starting
      point for the snow groomers. It’s shorter from Bjørnerudsæter, so the cost is
      about 600 kr from there vs. around 1,000 kr from Tempelseter. This is approximate
      as of 2023. Round-trip is cheaper than one-way. (typically 1,500 kr round-trip
      vs. 1,000 kr one-way for Tempelseter)
    format: text
    updated_at: '2026-03-31T08:37:09Z'
  2ea3b1eadb7f87a29aa61be5c2b3f486f4a78767d4d297c1661cc56f9bf69a83:
