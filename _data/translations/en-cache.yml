  9ad7171843f5f278a0a70fe40cedaa974d9b85572c4e5376cc8d608d4d9751f6:
    source_text: 'Vinteren 2024 var det ikke blitt bedre: blåste det så kjente jeg
      trekken i'
    translated_text: 'By the winter of 2024, things hadn''t gotten any better: whenever
      it blew, I could feel the draft'
