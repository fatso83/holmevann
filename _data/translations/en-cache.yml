  8aff7f1b463f68fde0c3e2da1e89430aa2342afef69a443ce02af431ecafcbe6:
    source_text: 'viktig når man parallelkobler. Selv et slitent batteri kan bidra
      positivt koblet i parallel, så lenge spenningskurven og toppspenningen er relativt
      lik. Er den ikke det kan ulik motstand i batteriene gjøre at belastningen blir
      ujevn. Da får man kortere levetid på batteriene. For min del så jeg at dette
      ikke ville være noe stort problem: jeg har nesten like batterier, strømtrekket
      er lite (2-5A), og siden jeg har så mye effekt på ladesiden så vil batteriene
      nesten alltid være > 95% ladet. Da blir slitasjen minimal. Siden jeg har et
      tidsperspektiv på 5 år, så tenker jeg at dette vil gå helt fint.'
    translated_text: 'This is important when connecting batteries in parallel. Even
      a worn-out battery can be beneficial when connected in parallel, as long as
      the voltage curve and peak voltage are relatively similar. If they aren’t, differences
      in resistance between the batteries can cause the load to be uneven. This results
      in a shorter battery life. For my part, I saw that this wouldn’t be a major
      problem: I have nearly identical batteries, the current draw is low (2–5 A),
      and since I have so much power on the charging side, the batteries will almost
      always be >95% charged. That keeps wear and tear to a minimum. Since I’m looking
      at a 5-year timeframe, I think this will work out just fine.'
    format: text
    updated_at: '2026-03-31T08:36:53Z'
