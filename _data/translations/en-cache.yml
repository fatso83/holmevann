  '04782e25bb590bc53313122b1a50cb63f60e7df4e73d683a0959f3059661f2cf':
    source_text: Båtjakten
    translated_text: The Boat Hunt
    format: text
    updated_at: '2026-03-31T08:36:57Z'
  9d616be3f1b6ad5b4db8869843e1d1594356987ecc16d98b56b77d2558d70d68:
    source_text: En uheldig leietaker glemte å feste båten ordentlig og både båten
      og årene forsvant når vannstanden økte med det enorme regnværet i slutten av
      august. Måtte komme meg opp og etter et par timers leting fant jeg båten i nordenden
      av vannet. Var såpass heldig at Erling Lüder-Larsen på Holmevassetra hadde funnet
      og dratt båten opp på land. Fant den ene åra i Sætervika, men den andre virker
      å ha forsvunnet ned Åselvavassdraget. Alt i alt gikk dette veldig bra, selv
      om båten ikke blir penere med alle disse uhellene. Heldigvis anskaffet jeg meg
      med tanke på at den kunne få litt juling :)
    translated_text: An unfortunate renter forgot to secure the boat properly, and
      both the boat and the oars disappeared when the water level rose due to the
      heavy rains at the end of August. I had to go out, and after a couple of hours
      of searching, I found the boat at the north end of the lake. I was lucky enough
      that Erling Lüder-Larsen at Holmevassetra had found and pulled the boat ashore.
      I found one oar in Sætervika, but the other seems to have disappeared down the
      Åselva river system. All in all, this turned out very well, even though the
      boat isn’t getting any prettier with all these mishaps. Luckily, I bought it
      knowing it might take a bit of a beating :)
    format: text
    updated_at: '2026-03-31T08:36:57Z'
  f2afbbfc09ae647af902b19adeb02eff94d4ab5495886238b5c5db2ab6ce35a4:
