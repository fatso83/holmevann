  a121ba9bad81c64a13ef5bb23a3045c5879d1bfb60bb84375a9ef323c5f73c34:
    source_text: Fra oktober til februar sliter vi med at det i lange perioder kan
      være veldig lite sol som treffer solcellepanelene våre. Vinkelen på solen er
      mye lavere slik at mindre energi blir samlet opp, det er færre timer i døgnet
      med sol, det er færre dager med blå himmel og sol og solcellepanelene har en
      tendens til å snø ned. Alt i alt gjør det at en typisk desemberuke kan innbringe
      så lite som 5%-10% av en typisk juliuke. Den eneste måten å kompensere for dette
      på blir å lade batteriene med aggregatet vårt - noe som både er bråkete og medfører
      en del komplikasjoner med tanke på utleie.
    translated_text: From October to February, we struggle with the fact that, for
      long periods, very little sunlight reaches our solar panels. The sun’s angle
      is much lower, so less energy is captured; there are fewer hours of sunlight
      per day; there are fewer days with blue skies and sunshine; and the solar panels
      tend to get covered in snow. All in all, this means that a typical week in December
      can yield as little as 5%–10% of a typical week in July. The only way to compensate
      for this is to charge the batteries using our generator—which is both noisy
      and causes some complications when it comes to renting out the property.
    format: text
    updated_at: '2026-03-31T08:36:50Z'
  272f95472adb946dd81b45dc047b5f447f6008f2bd2c4aa87e41cb7f4458857b:
