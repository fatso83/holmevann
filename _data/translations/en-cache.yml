  7240f89d5af73cc11194f8396070c060b5d32009d1307330b6320a69d36a27c9:
    source_text: i august var familien på ferie, så jeg brukte et par dager på å fridykke
      rundt i det altfor langrunne vannet til jeg fant en liten renne som hadde en
      frostfri dybde (ca 2m) og la pumpa ned der. 50 m med kabel opp til vannkanten
      ble installert, holdt nede av tunge steiner og i vannkanten borret jeg fester
      i fjellet.
    translated_text: In August, the family was on vacation, so I spent a couple of
      days free-diving around in the water—which was far too shallow—until I found
      a small channel with a frost-free depth (about 2 meters) and lowered the pump
      down there. I installed 50 m of cable up to the water’s edge, held down by heavy
      rocks, and at the water’s edge I drilled anchors into the rock.
    format: text
    updated_at: '2026-03-31T08:37:03Z'
  469d46000fb2d0b43e3a712162b38cc3e83a24f6d5390d333779b0e9c2622239:
    source_text: et par uker senere kom en kar fra Krøderen Elektro opp på fjellet
      og gjorde det elektriske på styringen (220V koblinger er litt for avansert/ulovlig
      for meg) og jeg fikk testa at ideen fungerte!
    translated_text: A couple of weeks later, a guy from Krøderen Elektro came up
      to the mountain and set up the electrical system for the controls (220V wiring
      is a bit too advanced/illegal for me), and I got to test that the idea worked!
    format: text
    updated_at: '2026-03-31T08:37:03Z'
  9f1f247d8b9c6b5622b2f1407e84780bd7f7bf993cbb4695cf68e7188556a6d8:
    source_text: 'Den virkelige testen: Suksess!'
    translated_text: 'The real test: Success!'
    format: text
    updated_at: '2026-03-31T08:37:03Z'
  92ad9a641d4b269ccb60b8b00c308fdd9f0583cacdadc1e05ecc353fa2100df2:
    source_text: Den 30. november 2024 hadde tykk is omsider lagt seg på vannet og
      endelig var dagen kommet for å teste at konseptet fungerte. Jeg og Fredrik koblet
      til varmekabler, fyrte opp aggregatet og koblet til slutt til pumpa etter en
      halvtime. Suksess!
    translated_text: On November 30, 2024, thick ice had finally formed on the water,
      and the day had finally come to test whether the concept worked. Fredrik and
      I connected the heating cables, started up the generator, and finally connected
      the pump after half an hour. Success!
    format: text
    updated_at: '2026-03-31T08:37:04Z'
