  749f0a546979e78563f15f9b6db5b3a99c85e96a56b6903cc3789a4e022940d5:
    source_text: Er det båt og/eller fiskeutstyr der?
    translated_text: Is there a boat and/or fishing gear there?
    format: text
    updated_at: '2026-03-31T08:37:09Z'
  dedd8153ad4078cf6d0e7bec834592349b7a14957ea2a6712759ce9e3788d966:
    source_text: 'Vi har kjøpt inn en plastbåt for utleie (se under)! Vi har litt
      fiskeutstyr: en stang, sluker og kroker. Husk å løs ut fiskekort (se punkt over)!
      Vi har ikke utgangspunktet ikke tenkt garn til utlån, ettersom det fort går
      i stykker og krever vedlikehold. Om du er forsiktig og rengjør garnene ordentlig
      etter bruk kan du få låne noen som ligger i båthuset (nabohytta). Send meg en
      melding i så fall, så du kan få vite hvor nøklen er. Båten ligger nede ved vannet.'
    translated_text: 'We’ve purchased a plastic boat for rent (see below)! We have
      some fishing gear: a rod, lures, and hooks. Remember to purchase a fishing license
      (see above)! We don’t plan to lend out fishing nets, as they break easily and
      require maintenance. If you’re careful and clean the nets properly after use,
      you can borrow some from the boathouse (the neighboring cabin). Send me a message
      in that case, and I’ll let you know where the key is. The boat is down by the
      water.'
    format: text
    updated_at: '2026-03-31T08:37:09Z'
  29cc627c0865512a965dcecfa25420fd5c49ac3f6126d04b3848437dd66ff3f0:
    source_text: Orkanen i 2022
    translated_text: The Hurricane of 2022
    format: text
    updated_at: '2026-03-31T08:37:09Z'
  6660ab2360a4672d81b99ebb65b1a26c29e695fb4fbac6bd8f7c95d46f62ff6a:
    source_text: ødela ikke bare taket, men gav også båten kraftig juling da den ble
      slengt 30 meter innover land, der blant annet tollegangene (a la åregafler)
      ble revet av. Gummilistene har fått noen skader, av ikke funksjonell art, som
      vi antagelig ikke får fikset, og sprekkene i skroget er tettet, så den er brukt
      både i 2022 og 2023. Vi har både elmotor m/90Ah batteri og årer tilgjengelig.
      Batteriet holder til tur/retur enden av vannet og lades enkelt på batterihylla
      med klyper.
    translated_text: It not only destroyed the roof, but also severely damaged the
      boat when it was hurled 30 meters inland, where, among other things, the oarlocks
      (similar to oar sockets) were torn off. The rubber strips have sustained some
      damage, of a non-functional nature, which we likely won’t be able to repair,
      and the cracks in the hull have been sealed, so it has been used in both 2022
      and 2023. We have both an electric motor with a 90Ah battery and oars available.
      The battery lasts for a round trip to the far end of the lake and is easily
      charged on the battery rack using clamps.
    format: text
    updated_at: '2026-03-31T08:37:09Z'
