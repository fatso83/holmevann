  8014fb7c4caf58fbf8d3a703611ee12ead09984f19ced4ab9396b5e73d61c99f:
    source_text: Har dessverre dårlig med tips til sluk og fluefiske, for vi bruker
      selv bare garn, men jeg har sett flere fluefiskere både langs Holmevann og nærliggende
      vann. Når myggen kommer i slutten av juni/juli begynner fisen å bite. Er det
      for kaldt er det dødt, har jeg latt meg fortelle …
    translated_text: Unfortunately, I don’t have much advice on lure or fly fishing,
      since we only use nets ourselves, but I’ve seen several fly fishermen both along
      Holmevann and in nearby lakes. When the mosquitoes arrive in late June or July,
      the fish start biting. If it’s too cold, there’s no action—or so I’ve been told…
    format: text
    updated_at: '2026-03-31T08:37:17Z'
  58fd06059ff09635b30f7355b56fd3ef489cc94cf9da4fb914f8e96fe4957fd5:
    source_text: Vi deler båthus med nabohytta, men trebåten i båthuset er dessverre
      ikke til utlån etter uvøren bruk. Vi har derimot kjøpt en enkel Rana plastbåt
      som ligger på land nede ved vannet. Vinteren 2022 ble den
    translated_text: We share a boathouse with the neighboring cabin, but unfortunately
      the wooden boat in the boathouse is not available for use due to careless handling.
      However, we have purchased a simple Rana plastic boat that is stored on land
      down by the water. In the winter of 2022, it was
    format: text
    updated_at: '2026-03-31T08:37:17Z'
  d1e8317e4a74454e3f7f94695627bcc4df60878c0831d88494454c10ecc888a9:
    source_text: skadet i en vinterstorm
    translated_text: injured in a winter storm
    format: text
    updated_at: '2026-03-31T08:37:17Z'
  e3a36eb6228b65bd476ff1338e33f91eb657c229354d923f2c786dda8c76ec20:
    source_text: ", men etter litt utbedringer funker den greit og var i bruk både
      sommeren 2022 og 2023. Vi har et 90Ah batteri og 600W elektrisk motor som bruker
      20 min over vannet. Det holder akkurat tur-retur. Batteriet lades enklest på
      batterihemsen på hytta fra dag-til-dag og det er en batterikasse du kan ha den
      i under kjøring, men det er ikke nødvendig. Det mest sjarmerende (og effektive)
      er uansett et par året ;)"
    translated_text: ", but after a few repairs, it works fine and was in use during
      both the summers of 2022 and 2023. We have a 90Ah battery and a 600W electric
      motor that lasts 20 minutes on the water. That’s just enough for a round trip.
      The easiest way to charge the battery is on the battery charger at the cabin
      overnight, and there’s a battery case you can use while driving, but it’s not
      necessary. The most charming (and efficient) option is a pair of them anyway
      ;)"
    format: text
    updated_at: '2026-03-31T08:37:17Z'
  e2bd23a5de84d39d06eb4d3438296ae03d6aa5959d46caeed1e8a5dd50051214:
    source_text: Man får kjøpt levende mark i butikken Solbua i Prestfoss eller en
      butikk i Eggedal sentrum. Om man lurer på surhetsgrad i vannene har jeg data
      på det i
    translated_text: You can buy live worms at the Solbua store in Prestfoss or at
      a store in downtown Eggedal. If you're wondering about the pH levels in the
      ponds, I have data on that in
    format: text
    updated_at: '2026-03-31T08:37:17Z'
  75f4ca6cc1c92c3d9a3493e2990eb515292a89d3ee9b13242c33568a0cc5bfbf:
    source_text: denne bloggposten
    translated_text: this blog post
    format: text
    updated_at: '2026-03-31T08:37:17Z'
  4f32ad5efb50b57d73840f6e7d79dd48b8c490ed43a56598a707f7513b3f7c2b:
    source_text: 'Det er masse sik og en del ørret. Siken pleier å holde seg i midten
      av annet og ørreten holder seg langs land. Det vaker ofte i overflaten i nærheten
      av hytta, så det kan godt være muligheter der. Et annet godt sted er å sjekke
      kartet over Holmevann som henger på hytta: der det er elveutløp (eller pleide
      å være elveutløp) står ofte ørreten! Den liker å gyte i gamle bekkefar, så ta
      på deg støvler og gå langs øst og nordbredden av vannet.'
    translated_text: 'There are plenty of whitefish and quite a few trout. The whitefish
      tend to stay in the middle of the lake, while the trout stay close to shore.
      They often rise to the surface near the cabin, so there might be some good fishing
      there. Another good spot is to check the map of Holmevann hanging in the cabin:
      where there are river outlets (or used to be river outlets), the trout are often
      found! They like to spawn in old stream channels, so put on your boots and walk
      along the east and north shores of the lake.'
    format: text
    updated_at: '2026-03-31T08:37:17Z'
