  0faa345e90e3dd84f7365f7c58eeb14225f9d96d495b4b3ddfffa26fdd379515:
    source_text: Vi hadde planlagt to uker i fjellet, men allerede dag en greide jeg
      å rive korsbåndet. Jeg fikk i det minste overbevist Røde Kors om å vente fire
      dager før de hentet meg ned på ATV, så vi fikk noen dager. Ironisk nok dro vi
      ned fra fjellet akkurat i det varmebølgen skyllet over landet og det hadde vært
      perfekt å henge i høyden …
    translated_text: We had planned two weeks in the mountains, but on the very first
      day I managed to tear my ACL. At least I managed to convince the Red Cross to
      wait four days before they brought me down on an ATV, so we got a few days.
      Ironically, we came down from the mountains just as a heat wave swept across
      the country, and it would have been perfect to stay up there…
