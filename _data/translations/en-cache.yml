  605d4665779bb22bd4e6ac1ff6a5efeccccd7684c967622c8e68e54242501fe5:
    source_text: Takstmannen hadde ikke giddi å gå inn i hytta og sjekke taket innenfra,
      så han hadde ikke oppdaget skadene som hadde oppstått på vindsperra. Polygon
      hadde bare utbedret den delen av taket de hadde fått beskjed om, så derfor blåste
      det kald luft (og snø!) rett inn på loftet og videre inn i resten av hytta.
    translated_text: The inspector hadn't bothered to go inside the cabin to check
      the roof from the inside, so he hadn't noticed the damage that had occurred
      to the roof sheathing. Polygon had only repaired the part of the roof they had
      been told about, which is why cold air (and snow!) was blowing straight into
      the attic and on into the rest of the cabin.
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  a11a352feceeaf216d37c9b3105434a666a62ed4a8087d89df582209fc318c85:
    source_text: Det førte blant annet til snø bak høyttaleren i stua!
    translated_text: Among other things, that led to snow piling up behind the speaker
      in the living room!
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  331490d095aecfbe33f0cf87e5f711a65a81a9cfecde58ebf9f14a860b0575e7:
    source_text: 'Termografikamera gjorde det veldig enkelt å finne alle stedene i
      hytta som holdt minusgrader etter to dager med oppvarming. Her er et eksempel
      fra det som vanligvis er det varmeste rommet (hemsen): minus 3,5 grader oppe
      ved pipa! Ikke rart temperaturen aldri kom over 0,5 plussgrader der oppe.'
    translated_text: 'The thermal imaging camera made it very easy to find all the
      spots in the cabin that were still below freezing after two days of heating.
      Here’s an example from what’s usually the warmest room (the loft): minus 3.5
      degrees up by the chimney! No wonder the temperature never rose above 0.5 degrees
      up there.'
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  fed06eb1a9af8306999931ec1709baa1e7542a38ce50f73005ca75f9ce6cb10c:
    source_text: Og blir det så utbedret umiddelbart?
    translated_text: And will it be fixed right away?
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  4e9bb862b9a9f4efde873a083d0df55d3e49b078f236a2154ba916e74c91ad0c:
    source_text: Man skulle jo tenke at når man finner ut at takseringen er gjort
      mangelfullt så ville forsikringsselskapet kaste seg rundt for å få fikset det
      umiddelbart. Men nei. Dette er Storebrand. Det er ikke sånn de jobber. De får
      beskjed i mars, Polygon sender opp en kar i august for å se på skadene som konkluderer
      med at det antagelig er flere skader rundt/ved pipa (umulig å si uten å fjerne
      all torva). Antagelig blir det da fikset på vårparten.
    translated_text: You’d think that once they realized the assessment had been done
      poorly, the insurance company would jump at the chance to get it fixed right
      away. But no. This is Storebrand. That’s not how they work. They’re notified
      in March; Polygon sends someone out in August to inspect the damage, who concludes
      that there’s likely more damage around/near the chimney (impossible to tell
      without removing all the turf). It’ll probably be fixed in the spring.
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  999afc9653701bea4fff1f99cbcca9935145287b1021465203b08f92ce02f38a:
    source_text: 'Så blir det stille i flere måneder … I desember får jeg beskjed
      fra en ny takstmann at han er satt på saken. Og han tenker å gjøre befaring
      når snøen har tint på vårparten. I mellomtiden har jeg satt nesten all utleie
      på hold fra april 2024, fordi jeg hele tiden har fått beskjed om at utbedringer
      snart vil skje (først våren, så sommeren, så høsten, så våren). Nå skjønner
      jeg at 2022 vil repetere seg på nytt: antagelig blir det ingen utbedring før
      på sommeren-høsten 2025.'
    translated_text: 'Then things go quiet for several months… In December, I receive
      a message from a new appraiser saying he’s been assigned the case. And he plans
      to conduct an inspection once the snow has melted in the spring. In the meantime,
      I’ve put almost all rentals on hold starting in April 2024, because I’ve been
      constantly told that repairs will happen soon (first in the spring, then in
      the summer, then in the fall, then in the spring). Now I realize that 2022 will
      repeat itself all over again: there will likely be no repairs until the summer
      or fall of 2025.'
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  f27fc5e17ac53e7585c66b09a6c219a3e5fee1599e6e106354e5197b51dbfe14:
    source_text: Og slik er ståa
    translated_text: And that's how it is
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  76c7b46adc66bd8172005d131aaa252c7bc540b6ac24d50f052d0a1b342c6195:
    source_text: Jeg vet ikke når hytta skal bli utbedret. Og uten det så blir det
      vanskelig å love den bort til leietagere, i tilfelle Polygon plutselig skal
      inn med tømrere og helikopter.
    translated_text: I don't know when the cabin will be renovated. And without that,
      it will be difficult to rent it out to tenants, in case Polygon suddenly sends
      in carpenters and a helicopter.
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  6082bb76ca0ff4f2cf186feb13fee252be0b994c351b182a79574d6bc8c1646c:
    source_text: 'Om du er interessert i å leie i vinter eller sommer kan det la seg
      gjøre, men da under visse forbehold:'
    translated_text: 'If you''re interested in renting during the winter or summer,
      it''s possible, but subject to certain conditions:'
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  '085b93bbb795d2a54f3cbbd46b9d4f90e41b3265866021df776bf3aac689babd':
    source_text: Om det er meldt kraftig vind kan det være vanskelig å holde hele
      hytta varm. Det går fint om man bare holder dørene til stua og kjøkkenet igjen.
    translated_text: If strong winds are forecast, it can be difficult to keep the
      whole cabin warm. It works fine if you just keep the doors to the living room
      and kitchen closed.
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  f2d77507ad947d84fe3a9e6f7c13c2996eedbb48ebb649c5b3372a696a0b3700:
    source_text: I sommerhalvåret vil det komme en periode på to uker da hyttetaket
      skal utbedres. Har du leid da må det avbestilles og jeg må bare betale deg tilbake.
      Dette er utenfor min kontroll.
    translated_text: During the summer, there will be a two-week period when the cabin
      roof needs to be repaired. If you have booked a stay during that time, you’ll
      need to cancel, and I’ll have to refund you. This is beyond my control.
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  120ccbf46a156447721ae37f2cde695a44a93cd198e7638492a2739d05d9da9d:
    source_text: Oppdatering april 2025
    translated_text: 'Update: April 2025'
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  1b77cab580df6d25f2c48842d57513e6bcc45759ce39a65adda5ee1daeaa6377:
    source_text: I vinterferien (midten av februar) var jeg inne på hytta med takstmannen.
      Siden har det vært helt stille fra Storebrand, med unntak av en selger som kunne
      informere meg om at saken stod stille fordi de ventet på svar fra Naturskadefondet.
      Det har selvsagt ikke saksbehandler svart meg på, til tross for at jeg har purret.
      Så jeg vet fremdeles ikke noe annet enn at det ikke blir utbedring med det første
      …
    translated_text: During the winter break (mid-February), I visited the cabin with
      the appraiser. Since then, there has been complete silence from Storebrand,
      with the exception of a sales representative who informed me that the case was
      on hold because they were waiting for a response from the Natural Perils Fund.
      Of course, the case manager has not responded to me, despite my follow-up. So
      I still know nothing other than that repairs won’t be made anytime soon…
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  a1464dc44acbe59120d075a62b2f8bece4235a81057d95e676d0cbc5b1dc46ca:
    source_text: Oppdatering juli 2025
    translated_text: 'Update: July 2025'
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  9df904cd30563dc7ecfaad48093fb8c8d95019f2c281d87993b7d6d2726c7b7a:
    source_text: Hyttetaket er fikset igjen. Storebrand mente man ikke skulle bytte
      hele taket, bare teipe igjen vindsperra internt på loftet. Jeg vet at det er
      uenighet internt om dette var riktig tilnærming, men det er i det minste den
      billigste tilnærmingen … Vinteren 2026 vil vise om det holder :)
    translated_text: The cabin roof has been repaired again. Storebrand felt that
      we shouldn’t replace the entire roof, but just tape up the roof sheathing from
      the inside of the attic. I know there’s some disagreement internally about whether
      this was the right approach, but at least it’s the cheapest option… Winter 2026
      will show if it holds up :)
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  c5d5e499fd238ca5581870194c7791a4034cb9ef5cfc3e78be8c093a58174897:
    source_text: 'Nytt krysningspunkt sommerstid! | #holmevann1013moh'
    translated_text: 'New crossing point during the summer! | #holmevann1013moh'
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  58cf75a75cf96b66801281347b79d6cdbd8a626238f4ce340dd41be828051022:
    source_text: Nytt krysningspunkt sommerstid!
    translated_text: New intersection during the summer!
    format: text
    updated_at: '2026-03-31T08:37:00Z'
  78081fcf97b4ddce6ad41b8f73b53182a924ae424a0d3fb71f53c768ff387f09:
    source_text: Det har ofte vært et problem sommerstid at man kan slite litt med
      å krysse østover fra hytta uten å bli våt på beina, for man må passere det som
      blir Åselva-vassdraget. Nytt av året er at noen gode samaritaner har bygget
      en bro ved utløpet av Holmevann! Tidligere måtte man tatt av seg på beina eller
      bli riktig våt, men nå er det altså en solid bro, festet til fjell, som lar
      en krysse på det smaleste uten å måtte hoppe fra stein til stein.
    translated_text: It has often been a problem in the summer that it can be a bit
      of a struggle to cross eastward from the cabin without getting your feet wet,
      since you have to cross what becomes the Åselva river system. New this year
      is that some good Samaritans have built a bridge at the outlet of Holmevann!
      Previously, you had to take off your shoes or get really wet, but now there
      is a sturdy bridge, anchored to the rock, that lets you cross at the narrowest
      point without having to hop from rock to rock.
    format: text
    updated_at: '2026-03-31T08:37:00Z'
