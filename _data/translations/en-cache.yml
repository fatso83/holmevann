  24b1cb5cd2b756fa09a13b4154a57b879c91438f3ddca0561219184f87117d51:
    source_text: Vi har nå inngått et samarbeid med Svalbardguidene som innebærer
      at de tar hytta i bruk for skredkurs i Norefjellsområdet! Pilot-helgen blir
      27.-29. januar 2021. Det blir veldig spennende å se hva det kan bli ut av dette,
      for jeg har lenge tenkt at hytta er perfekt for folk som liker å gå i terreng
      og ønsker å starte turene inne på vidda.
    translated_text: We have now entered into a partnership with Svalbardguidene,
      which means they will be using the cabin for avalanche courses in the Norefjell
      area! The pilot weekend will be January 27–29, 2021. It will be very exciting
      to see how this turns out, because I’ve long thought that the cabin is perfect
      for people who enjoy hiking in the backcountry and want to start their trips
      out on the open plateau.
    format: text
