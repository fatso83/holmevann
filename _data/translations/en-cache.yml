  72d144b71bd4f585493cea46c585be100c37e334e235c998b160c72fc6f92109:
    source_text: "Det skal relativt lite til for å lage en liten dings som ved hjelp
      av ultralydsensorer kan måle vannstand i en tank. Tanken er å bruke et par slike
      i drivstofftanken til wallas-en og i vanntanken, koble dem til en LTE-M gateway
      via LoRa og dytte dataene ut på internett. Da kan man se status på dette direkte
      fra hjemmesiden \U0001F913 Trenger bare å lage noen “Edge Functions” i Netlify
      for å ta imot og vise dataene."
    translated_text: "It doesn’t take much to build a small device that uses ultrasonic
      sensors to measure the water level in a tank. The idea is to use a couple of
      these in the fuel tank of the Wallas and in the water tank, connect them to
      an LTE-M gateway via LoRa, and push the data to the internet. Then you can check
      the status directly from the website \U0001F913 All you need to do is create
      some “Edge Functions” in Netlify to receive and display the data."
    format: text
    updated_at: '2026-03-31T08:37:02Z'
  22ae5c26916ea85a8a15eadc91d6b6d2b2d68f70a7702d9d6dd8628eec443844:
    source_text: Lora (for “Long Range”) er en trådløs radioteknologi utviklet av
      Semtech for langdistansekommunikasjon med svært lavt strømforbruk. Det er en
      hjørnestein i IoT-applikasjoner (Internet of Things), og muliggjør dataoverføring
      over mange kilometer, ofte brukt i smarte byer, landbruk og industri.
    translated_text: LoRa (short for “Long Range”) is a wireless radio technology
      developed by Semtech for long-range communication with extremely low power consumption.
      It is a cornerstone of IoT (Internet of Things) applications and enables data
      transmission over many kilometers; it is frequently used in smart cities, agriculture,
      and industry.
    format: text
    updated_at: '2026-03-31T08:37:02Z'
  0c261403d2bf289555adb16ff8cb453a943a7e71dfd889fcf2988024df6664be:
    source_text: En arduino-kompatibel ESP32, en billig LoRa-modul og en ultralydsensor
      koster typ 200 kr. Med deep sleep og oppvåkning en gang i timen burde de fint
      kjøre et år uten behov for nytt batteri.
    translated_text: An Arduino-compatible ESP32, an inexpensive LoRa module, and
      an ultrasonic sensor cost around 200 kr. With deep sleep mode and waking up
      once an hour, they should easily last a year without needing a new battery.
    format: text
    updated_at: '2026-03-31T08:37:02Z'
  1595b31d19a94f549ee254c932a76901633b40ebb3f719e1a0aed1c102132ee1:
    source_text: Vi har lenge hatt parabol fra Allente (Canal Digital), men det koster
      bare helt sykt mye og parabolen kom ofte ut av posisjon. Nå har vi kabelbrudd
      og jeg måtte vurdere om det gav mening å betale 700 kr/mnd for noe veldig få
      bruker. Mange vil gjerne strømme TV/serier, men vi har ikke dekning for 4G.
      Jeg hadde lenge (2021) planlagt et større prosjekt med kabling til nærmeste
      topp og 4G-antenne med Power-over-Ethernet og mye customelektronikk for å få
      til dette likevel, men så dukket Starlink opp. Lenge kostet det 1000 spenn i
      måneden, men nå er det tilgjengelig til under prisen av det Allente skal ha
      …
    translated_text: We’ve had a satellite dish from Allente (Canal Digital) for a
      long time, but it costs an absolute fortune and the dish often lost its alignment.
      Now we have a cable outage, and I had to consider whether it made sense to pay
      700 kr/month for something very few people use. Many people would like to stream
      TV shows and series, but we don’t have 4G coverage. I had been planning a major
      project for a long time (2021) involving cabling to the nearest peak and a 4G
      antenna with Power-over-Ethernet and a lot of custom electronics to make this
      work anyway, but then Starlink came along. For a long time, it cost 1,000 kroner
      a month, but now it’s available for less than what Allente charges…
    format: text
    updated_at: '2026-03-31T08:37:02Z'
  37b51bbd752639628f5d7a92e238dc2f9915ab05dd1d098b0c7880c39c2ae228:
    source_text: 'Ulempen er høyt strømtrekk: det trekker over 100W i oppstart før
      det faller til < 30 watt når det har stabilisert seg. 2 ampere er fremdeles
      alt for mye (50 Ah/døgn) til at det er levelig vinterstid, spesielt hvis vi
      skulle glemme å skru det av, så dette betinger to ting:'
    translated_text: 'The downside is high power consumption: it draws over 100 watts
      during startup before dropping to less than 30 watts once it has stabilized.
      2 amps is still far too much (50 Ah/day) to be manageable in the winter, especially
      if we were to forget to turn it off, so this requires two things:'
    format: text
