  ea627dd7e8ab702576239bfdd8f7bcfb7430dc470bdc8861e1fea968318a08db:
    source_text: ". Ved oppstart drar motoren mange ganger det. Den må derfor kjøres
      på aggregat, men i det minste tar det bare 45 min på å fylle tanken."
    translated_text: ". When starting up, the engine draws many times that amount
