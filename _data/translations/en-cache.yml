  7df53ad2822e693b95525f64e187906c33b6b5e6de471b053331162d945a3066:
    source_text: Fjellene rundt hytta kan ikke tilby Røldals pudder eller Finnmarks
      fjord-og-sjø-nedkjøringer, men man kan ha det ganske ålreit om man har været
      på sin side. Fra hovedsoverommet ser man rett på Ranten (1419 m.o.h.) - det
      mest kjente toppturmålet i nærhet til Oslo. Det er dog et godt stykke dit, og
      man har flere topper med et par hundre høydemeter fall fra 600 m til 2 km unna.
    translated_text: The mountains around the cabin can’t offer Røldal’s powder or
      Finnmark’s fjord-and-lake runs, but you can still have a pretty good time if
      the weather’s on your side. From the master bedroom, you have a direct view
      of Ranten (1,419 m above sea level)—the most famous summit destination near
      Oslo. It’s quite a distance away, though, and there are several peaks with a
      few hundred meters of elevation gain ranging from 600 m to 2 km away.
    format: text
    updated_at: '2026-03-31T08:36:59Z'
