  314b1773d9651e4d7fd6fb4cbb482dab3c79a5e072309f33e04404692d799ea1:
    source_text: ". Da kunne i hvert fall hytta muligens brukes i løpet av vinteren,
      tenkte jeg. Og etter litt nødhjelp fra noen karer fra Frøyse Bygg fikk vi skrudd
      på plass asfaltpapp så det var tett før snøen kom. Deilig å kunne slappe av
      litt."
    translated_text: '"At least then the cabin might be usable during the winter,"
      I thought. And after a little help from some guys at Frøyse Bygg, we managed
      to lay down some roofing felt so it was waterproof before the snow came. It
      was nice to be able to relax a bit.'
    format: text
    updated_at: '2026-03-31T08:36:55Z'
