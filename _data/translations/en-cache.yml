  a432e41b99e96cdb9ea4f6c888a139dd63fd45b6b67da15cb509c1998d2b8a5c:
    source_text: Ønsker man å få kjørt inn seg selv eller bagasje med snøskuter kjører
      man til parkeringsplassen på Tempelseter. Går man inn derfra tar det ca 1t 20min.
    translated_text: If you want to take a snowmobile to transport yourself or your
      luggage, drive to the parking lot at Tempelseter. If you start the hike from
      there, it takes about 1 hour and 20 minutes.
    format: text
    updated_at: '2026-03-31T08:37:15Z'
  197ffb9a016e875ca558dd63032ba948ee36993e3bfaf390c70a8d17790d9656:
    source_text: For å komme inn i hytta må man ha nøkkel. Noen dager før ankomst
      sender jeg en pinkode til nøkkelboksen. Har du ikke fått den 2 dager før må
      du ringe meg, men sjekk søppelfilteret først ;) Den finnes også i innsjekkingsdetaljene
      i AirBnb-appen - om du skulle bruke den.
    translated_text: You’ll need a key to get into the cabin. A few days before your
      arrival, I’ll send you a PIN code for the key box. If you haven’t received it
      two days before your arrival, please call me—but check your spam folder first
      ;) You can also find it in the check-in details in the Airbnb app, if you’d
      like to use that.
    format: text
    updated_at: '2026-03-31T08:37:15Z'
  '0309c5a4d958c3e2d04fee5d3d3d624014edf1a32cc77e098155f241646efdba':
