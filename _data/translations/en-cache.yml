  73e8c9d31417a78fdddd70a7e0da20f9677619e5a8510e84d2ee547d72ca3f7e:
    source_text: Og dermed var det gjort. Taket var nå helt ødelagt. Jeg håpet lenge
      at det skulle bli fikset i løpet av vinteren, men takstmannen til Storebrand
      hadde ikke en gang fått sett på skadene før etter tre måneder. Sykt dårlig levert
      av Storebrand sammenlignet med Gjensidige, som håndterte første skade.
    translated_text: And that was that. The roof was now completely destroyed. I had
      long hoped it would be repaired over the winter, but Storebrand’s claims adjuster
      hadn’t even inspected the damage until three months later. Storebrand’s service
      was abysmal compared to Gjensidige, which handled the initial claim.
    format: text
    updated_at: '2026-03-31T08:36:55Z'
  '02391f2e0c9746d3e93472f1626818c51ed7bdfdc430a72eee2fb6bef96a8374':
    source_text: I slutten av juni fikk jeg omsider tak i han som skulle prosjektere
      for Storebrand og det beste han kunne komme var at de håpet å kunne starte opp
      i august. Nå er vi to uker inn i august og ingenting har skjedd og ingen har
      latt høre fra seg eller svart på epost eller SMS. Ikke imponert :/
    translated_text: At the end of June, I finally got in touch with the guy who was
      supposed to handle the design work for Storebrand, and the best he could offer
      was that they hoped to get started in August. Now we’re two weeks into August
      and nothing has happened, and no one has gotten back to me or replied to my
      emails or texts. Not impressed :/
    format: text
    updated_at: '2026-03-31T08:36:55Z'
  e1c97b486de1cff0a979543058a3f7f6cda6ceb94ec6d8933f33387c2d9f564a:
    source_text: Forbedringer
    translated_text: Improvements
    format: text
    updated_at: '2026-03-31T08:36:55Z'
  425fc0a030b27f6847485b1395b2bb11ab55175c8b09824a2cbe2c9baeeb8b78:
    source_text: På min side hadde jeg allerede i februar fått kontrahert byggingeniør
      Johan Breistein til å lage tegninger på en forsterkning av taket så jeg skulle
      slippe dette igjen. Det innebærer blant annet armering av torva med hønsenetting
      som skal skrus fast i taket, samt nye, kraftigere fester av panelene til bærende
      bjelker i taket med godkjent tetting. Så får vi bare se om Polygon greier å
      fikse det før vinteren er her igjen :)
    translated_text: For my part, I had already hired structural engineer Johan Breistein
      back in February to draw up plans for reinforcing the roof so I wouldn’t have
      to deal with this again. This involves, among other things, reinforcing the
      turf with chicken wire that will be screwed into the roof, as well as new, stronger
      fastenings for the panels to the load-bearing beams in the roof, complete with
      approved waterproofing. So we’ll just have to see if Polygon manages to fix
      it before winter comes around again :)
    format: text
    updated_at: '2026-03-31T08:36:55Z'
