  '07192ac62bd8b361166d70e646298efe8430bd47b78d559f3bfda03e31606c40':
    source_text: "Denne helgen har jeg fått en elektriker til å gå over alt det elektriske
      jeg har gjort selv i sommer. Det holdt ikke bare for ham å sjekke at det var
      OK: han endte med å åpne veggen og legge alle de eksponerte kablene inn i veggen.
      Plutselig var alle hullene i ytterveggen og de 30 metrene med kabel ut og under
      hytta ikke lenger nødvendige … whoops, sveitserost for nothing \U0001F648"
    translated_text: "This weekend, I had an electrician go over all the electrical
      work I’d done myself this summer. It wasn’t enough for him to just check that
      everything was OK: he ended up opening up the wall and running all the exposed
      cables inside it. Suddenly, all the holes in the exterior wall and the 30 meters
      of cable running out from and under the cabin were no longer necessary… whoops,
      Swiss cheese for nothing \U0001F648"
    format: text
    updated_at: '2026-03-31T08:36:51Z'
