  1c38dbd72e7e136b4a89cf0397ff536b9d32c6b29913bb5e832709d9504d4e5c:
    source_text: 'Jeg har mer eller mindre fjernet hytta fra både AirBnb og iNatur
      i 2025. Grunnen er enkel: jeg oppdaget vinteren 2024 flere skader på taket og
      Storebrand forsikring har (atter en gang) ikke fått ut fingeren i tide for å
      utbedre skadene. Det betyr at jeg ikke vet når det skal utbedres, men det vil
      antagelig skje enten i juni 2025 eller august/september 2025. Du kan fremdeles
      leie, men med forbehold om at du plutselig må få pengene tilbake …'
    translated_text: 'I have more or less removed the cabin from both Airbnb and iNatur
      for 2025. The reason is simple: in the winter of 2024, I discovered several
      instances of damage to the roof, and Storebrand Insurance has (once again) failed
      to act in time to repair the damage. This means I don’t know when the repairs
      will be done, but it will likely happen either in June 2025 or August/September
      2025. You can still rent it, but with the caveat that you might suddenly have
      to get your money back…'
    format: text
    updated_at: '2026-03-31T08:36:59Z'
