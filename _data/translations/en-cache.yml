  1d1e6ce4a0b2d8477449023b282ac9fa3fb97343f1c84f73da076e9040750567:
    source_text: ", og i hovedsak fulgte gjennomføringen hovedtrekkene jeg tegnet
      opp. Forskjellen er litt detaljer på avstiving, hvordan wirene ble trukket og
      at panelene ligger flatt."
    translated_text: ", and for the most part, the installation followed the general
      outline I had drawn up. The differences lie in some details regarding bracing,
      how the wires were pulled, and the fact that the panels lie flat."
    format: text
    updated_at: '2026-03-31T08:36:51Z'
  784f7d165c7f877a2aa3ee6f9ecc8af2e2535a2b7b28e3190ca944a27ce2f898:
    source_text: 'Det var så utrolig lite energi å hente på å vinkle panelene målt
      over en måned, samtidig som det økte risikoen for at vinden ødela alt, at det
      fort ble droppet. Jeg har samlet noen bilder her fra prosjektet:'
    translated_text: 'Tilting the panels yielded so little energy over the course
      of a month—while also increasing the risk that the wind would destroy everything—that
      the idea was quickly scrapped. I’ve put together a few photos from the project
      here:'
    format: text
    updated_at: '2026-03-31T08:36:51Z'
  e04a8c63bed5aaa1bc019740b13a482fd5d6e08fd0623eaccc0e5d5f3045d410:
    source_text: Nå har vi tidoblet makseffekten (ca 1kW) på lading og på batterisiden
      har vi nå i praksis (minst) en seksdobling av fjorårets kapasitet pga flere
      batterier, bedre temperatur vinterstid og ikke minst bedre lading fra en regulator
      som ikke måler 0,3V feil spenning :)
    translated_text: We have now increased the peak power (approx. 1 kW) during charging
      tenfold, and on the battery side, we now effectively have (at least) six times
      last year’s capacity thanks to more batteries, better temperatures in the winter,
      and, not least, more efficient charging from a regulator that doesn’t measure
      a 0.3 V voltage error :)
    format: text
    updated_at: '2026-03-31T08:36:51Z'
