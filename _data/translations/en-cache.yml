  dd1bae53c6c7f2659aa4a6aff19275b11e6a01fd02923f4731e440fe899f2817:
    source_text: Den aller fineste tiden på fjellet for skigåing er på våren. Det
      er det tilsynelatende ingen som skjønner, for etter påske er det ingen som kommer
      før i slutten av juni. Det er i mai du kan nyte en velfortjent iskald pils på
      plattingen i ettermiddagssol etter å ha blitt sakte grillet i rotisseriet som
      et snøkledd vårfjell er. Snøbroene over bekken pleier å gå litt etter syttende
      mai, men det er vanligvis mulig å gå på ski til første juni.
    translated_text: The very best time for skiing in the mountains is in the spring.
      Apparently, no one seems to realize this, because after Easter, no one comes
      until the end of June. It’s in May that you can enjoy a well-deserved ice-cold
      beer on the terrace in the afternoon sun after having been slowly roasted in
      the rotisserie that is a snow-covered spring mountain. The snow bridges over
      the stream usually start to melt a little after May 17th, but it’s usually possible
      to ski until early June.
    format: text
    updated_at: '2026-03-31T08:36:58Z'
  04267d1a2c0941d53b300235566489dd2b3b1562cd2520a0605acdeeea47c94c:
    source_text: "For å minne deg om hva du går glipp av, her er noen bilder fra mai
      måned de siste årene. Jeg tok med et par bilder av overvann og snøbroer som
      har smeltet bort i slutten av mai, så det ikke kommer noen overraskelser \U0001F600
      Isen forsvinner veldig fort, men er trygg helt til overvannet gjør det uattraktivt
      å gå der."
    translated_text: "To remind you of what you’re missing out on, here are some photos
      from May over the past few years. I’ve included a couple of photos of meltwater
      and snow bridges that have melted away by the end of May, so there won’t be
      any surprises \U0001F600 The ice disappears very quickly, but it’s safe until
      the meltwater makes it unsafe to walk there."
    format: text
    updated_at: '2026-03-31T08:36:58Z'
