    updated_at: '2026-03-31T08:36:56Z'
  540a187b9e7bfb83b0440bcde513917b1f0a5699d99b21a8969421758cdda7f4:
    source_text: 'Da er taket endelig på plass, halvannet år etter to orkaner ødela
      det opprinnelige taket på nordsiden. Dro opp torsdag kveld med Jakob og Hans
      og på fredag prototypet og testet vi en slede for å dra torva på til vi hadde
      noe som funket bra: hjul under en halv europalle med sidestabiliserende hjul
      ble gull. Vi brukte den til å dra opp en pall med markplater som skulle ligge
      underst for isolasjon, før ytterligere 3 venner kom opp på lørdag og den store
      jobben med å dra opp 180 sekker med torv og fordele det skulle gjøres. Når det
      først kom i gang var vi ferdige på bare 4 timer! Venter med frøsåing til jeg
      kommer opp i juli og kan etterse vanningen, men fikk testet at konseptet med
      pumpe med vannet med overganger til vanlig hageslange funket.'
    translated_text: 'The roof is finally in place, a year and a half after two hurricanes
      destroyed the original roof on the north side. We headed up Thursday evening
      with Jakob and Hans, and on Friday we prototyped and tested a sled to haul the
      turf until we found something that worked well: wheels attached to half a Euro
      pallet with side-stabilizing wheels turned out to be the perfect solution. We
      used it to haul up a pallet of ground panels to be placed underneath the insulation,
      before three more friends arrived on Saturday to tackle the big job of hauling
      up 180 bags of peat and spreading it out. Once we got started, we were done
      in just 4 hours! I’m waiting to sow the seeds until I come up in July and can
      oversee the watering, but I did test that the concept of using a pump with water
      connections to a regular garden hose worked.'
    format: text
    updated_at: '2026-03-31T08:36:56Z'
