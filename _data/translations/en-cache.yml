  358d361478ff7cc136e19655af2d9ab4111e25ce734c87424ca1629901359fa4:
    source_text: Er det fisk i vannet? Trenger man fiskekort?
    translated_text: Are there any fish in the water? Do you need a fishing license?
    format: text
    updated_at: '2026-03-31T08:37:09Z'
  fd933c17f322f05b6bf3da62069f1703aafbfe126d744840067ea096abf6d109:
    source_text: 'Når jeg setter garn får jeg mye sik og noen få ørret (forhold 3:1
      i favør sik), men jeg kan dessverre lite om stangfiske. Det jeg vet er at mange
      stangfiskere kommer tilbake, og at fisken biter lite tidlig på sommeren (før
      myggen kommer). Siken pleier å holde seg i midten av annet og ørreten holder
      seg langs land. Det vaker ofte i overflaten i nærheten av hytta, så det kan
      godt være muligheter der. Et annet godt sted er å sjekke kartet over Holmevann
      som henger på hytta: der det er elveutløp (eller pleide å være elveutløp) står
      ofte ørreten! Den liker å gyte i gamle bekkefar, så ta på deg støvler og gå
      langs øst og nordbredden av vannet. Du trenger fiskekort, men det kan du på
      behagelig vis'
    translated_text: 'When I set my nets, I catch a lot of whitefish and a few trout
      (a 3:1 ratio in favor of whitefish), but unfortunately I know very little about
      rod fishing. What I do know is that many anglers return, and that the fish don’t
      bite much in early summer (before the mosquitoes arrive). The whitefish tend
      to stay in the middle of the lake, and the trout stay along the shore. There’s
      often activity on the surface near the cabin, so there might be opportunities
      there. Another good spot is to check the map of Holmevann hanging in the cabin:
      where there are river outlets (or used to be river outlets), the trout are often
      found! They like to spawn in old stream channels, so put on your boots and walk
      along the east and north shores of the lake. You’ll need a fishing license,
      but you can easily get one'
    format: text
    updated_at: '2026-03-31T08:37:09Z'
  93d8779a213bd2694d50b33b2a8a91fd424dee47f902e6c067eac27b6b1a13bb:
