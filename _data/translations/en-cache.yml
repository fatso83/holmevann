  eebceceb35a86dcdb0561a5fb6a2e4138401dec01a05a43c020d5a8ed145e8d4:
    source_text: "Sist vinter hadde vi virkelig ikke hellet med oss og havnet i avisa.
      Først kom en orkan i slutten november 2021 med de sterkeste vindene man har
      registrert i Sigdal. Vindkastene kom opp i 52 meter i sekunden (omtrent 200
      km/t) - så sterkt at mosen ble skrellet av fjellknausene rundt \U0001F631 (Ekstern
      rapport)"
    translated_text: "Last winter, we really didn't have any luck and ended up in
      the newspaper. First, a hurricane struck in late November 2021, bringing the
      strongest winds ever recorded in Sigdal. Wind gusts reached 52 meters per second
      (about 200 km/h)—so strong that the moss was stripped off the surrounding rocky
      outcrops \U0001F631 (External report)"
    format: text
    updated_at: '2026-03-31T08:36:54Z'
