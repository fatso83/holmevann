  d378186872d62c4a9001a00fb85f1b06059d4fc7697ab2cec6babd7cde7f74ef:
    source_text: Vannet får jeg ikke gjort noe med før i januar og jeg får ikke fikset
      ovnen før snøen har kommet så jeg kan dra den ned på pulk. Argh.
    translated_text: I won't be able to do anything about the water until January,
      and I can't fix the stove until the snow comes so I can pull it down on a sled.
      Argh.
    format: text
    updated_at: '2026-03-31T08:36:57Z'
  86f0114f055422a4831ef5961527bbdfa0944ab63cbc7c41141e91cc92b1aec3:
    source_text: 'Wallas-en er tilbake og diesel er noe herk | #holmevann1013moh'
    translated_text: 'The Wallas is back, and diesel is the way to go | #holmevann1013moh'
    format: text
    updated_at: '2026-03-31T08:36:57Z'
  2aa162519d5bc83e279960ca2e85264ce0724c836cc30a841b9e8ba286aa4526:
    source_text: Wallas-en er tilbake og diesel er noe herk
    translated_text: The Wallas is back, and diesel is a thing again
    format: text
    updated_at: '2026-03-31T08:36:57Z'
  '022583385576c0b6b81643067ccee157ddef773100d752186b439722a8fd5718':
    source_text: Wallas er parafinkaminen vår som har gått mer eller mindre utrettelig
      i nær tyve år. Eller … parafinkamin blir ikke riktig å si lenger. Parafin forsvant
      fra markedet da fyringsoljeforbudet for boliger kom i 2020, så nå går den på
      diesel. Den brenner like godt på det, men det er likevel noen irriterende forskjeller
      i praksis, skal det vise seg.
    translated_text: Wallas is our paraffin stove, which has been running more or
      less nonstop for nearly twenty years. Or… “paraffin stove” isn’t really the
      right term anymore. Paraffin disappeared from the market when the ban on heating
      oil for residential use took effect in 2020, so now it runs on diesel. It burns
      just as well on that, but as it turns out, there are still some annoying differences
      in practice.
    format: text
    updated_at: '2026-03-31T08:36:57Z'
  1a2c2291b2880c211788a9ad052996b104f5679d136496290078dfc2b6a0a7ad:
    source_text: Jan 19, 2024
    translated_text: January 19, 2024
    format: text
    updated_at: '2026-03-31T08:36:57Z'
  7070425eb4f94ca738a7e28a64d84a4630ff4e1113a01a0742eccb38fadc0b60:
    source_text: "#diesel"
    translated_text: "#diesel"
    format: text
    updated_at: '2026-03-31T08:36:58Z'
  fc0cf74eb1ecfaa97a498b8203eb565ea9c2bd83e9699ad49aadb0753931138d:
    source_text: "Wallas-en er utrolig digg å ha når det er kaldt, ettersom den står
      og varmer kontinuerlig uten at man trenger å tenke på noe (annet enn prisen
      \U0001F648). Luktfritt og ganske stille gir den 4000 watt døgnet gjennom. Dessverre
      stoppet den helt opp i november - uten at jeg skjønte hvorfor."
    translated_text: "The Wallas is incredibly nice to have when it's cold, since
      it just sits there and heats continuously without you having to think about
      anything (other than the price \U0001F648). Odorless and fairly quiet, it delivers
      4,000 watts around the clock. Unfortunately, it stopped working completely in
      November—and I have no idea why."
    format: text
    updated_at: '2026-03-31T08:36:58Z'
  7337ccde462a48c779ac5f8e1e3f999fe092033f9ca4a66b6261cb2331f18600:
    source_text: Tok den på service, og der funket den som bare det. Snodig … men
      for å gjøre en lang historie kort er den tilbake på fjellet, nå oppgradert med
      4G-fjernstarter slik at man kan ringe hytta varm (eller i hvert fall lunken
      … det er mye tømmer).
    translated_text: I took it in for service, and there it worked like a charm. Strange…
      but to make a long story short, it’s back in the mountains, now upgraded with
      a 4G remote starter so you can call the cabin while it’s warm (or at least lukewarm…
      there’s a lot of wood).
    format: text
    updated_at: '2026-03-31T08:36:58Z'
  5478e87e4afa64290c2aa954c7009109565d231d0152666a7289defb174c43c8:
    source_text: Jeg fikk dessverre ikke tid til å sette opp fjernstarteren før jeg
      dro, for alt for mange timer gikk med til å finne ut hvorfor den ikke ville
      starte opp. Ja, for den ville ikke starte. Jeg visste det var diesel på tanken,
      jeg hadde sugd opp diesel i slangen (anbefaler annen drikke) og visste derfor
      at slangen ikke var tett, og jeg kunne også se at brennerelementet ble varmt.
      Likevel tentes det ikke … WTF.
    translated_text: Unfortunately, I didn’t have time to set up the remote starter
      before I left, because I spent far too many hours trying to figure out why it
      wouldn’t start. Yes, because it wouldn’t start. I knew there was diesel in the
      tank; I’d sucked diesel up through the hose (I recommend a different drink)
      and therefore knew the hose wasn’t clogged, and I could also see that the burner
      element was getting hot. Yet it wouldn’t ignite… WTF.
    format: text
    updated_at: '2026-03-31T08:36:58Z'
  a2a8761b6e8e07bcb0a0c604bdb23f0fc430a3a0e7c8259d7f1d6d21b7ed3fe0:
    source_text: 'Det var da jeg kom på noe jeg hadde først opplevd og innsett i fjor:
      med diesel kommer problemer jeg aldri har tenkt å forholde meg til før: dieseldyr
      og vann.'
    translated_text: 'That’s when I realized something I had first experienced and
      come to terms with last year: diesel comes with problems I never intended to
      deal with before: the cost of diesel and water.'
    format: text
    updated_at: '2026-03-31T08:36:58Z'
  9ebe5b77801e07cb35fd0be7e62dc4c2bdd30718570ce464738ba458a935067e:
    source_text: Dieseldyr er en fellesbetegnelse på bakterier, sopp og algearter
      (…) spiser dieselolje (…). En enkelt celle kan bli til en biomasse på ti kilo
      i løpet av bare tolv timer. Dieseldyrene er avhengig av vann for å overleve.
      De lever av en type hydrokarboner (…). Dieseldyrene stortrives (…) i laget mellom
      vann og diesel.
    translated_text: '"Diesel animals" is a collective term for bacteria, fungi, and
      algae species (…) that feed on diesel fuel (…). A single cell can grow into
      a biomass weighing ten kilograms in just twelve hours. Diesel animals depend
      on water to survive. They feed on a type of hydrocarbon (…). Diesel animals
      thrive (…) in the layer between water and diesel.'
    format: text
    updated_at: '2026-03-31T08:36:58Z'
  cfae90fe038bdf77f047aa9efacb60fcd4f8340af2b6247a1c0237706400c7cb:
    source_text: Fra
    translated_text: From
