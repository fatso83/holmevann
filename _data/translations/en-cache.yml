  2ea29aee4c1b92765d79b2040449b37685e17f6ab0cf2d079840ebcba3f5e3cb:
    source_text: ". Husk å lade telefonen godt på forhånd!"
    translated_text: ". Remember to charge your phone fully in advance!"
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  '08b5aca127881f6404a04a9283e5cd4279ceb62c9b1f35861e8fcd585678bdd8':
    source_text: Google Maps på smarttelefoner kan også forhåndsnedlaste områder.
      Gjør du det før ankomst så kan du følge i mine spor hele veien (se kartsiden,
      som kan åpne kartene direkte i appen) inn uten å tenke på dekning. Når det er
      sagt, så finner de fleste fram uten mobil, men det blir fort mørkt på høsten!
    translated_text: Google Maps on smartphones also lets you download areas in advance.
      If you do this before you arrive, you can follow in my footsteps the whole way
      (see the map page, which opens the maps directly in the app) without worrying
      about cell service. That said, most people can find their way without a cell
      phone, but it gets dark quickly in the fall!
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  d8cc2f37a3678f47cbb02660dada6fe33cd4e68b7e40f3e88b4c78da09b20db8:
    source_text: Det tar 2t15m fra Oslo (uten stopp) til parkeringsplassen i tregrensen.
      Har du GPS kan du plotte inn “Bjørnerudseterveien 174”.
    translated_text: It takes 2 hours and 15 minutes from Oslo (nonstop) to the parking
      lot at the tree line. If you have a GPS, you can enter “Bjørnerudseterveien
      174”.
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  cb982c35890ba1d5c27a40ce01e4f752ba7e10a4da2aa604472d7af7ff094689:
    source_text: Kjør gjennom Eggedal sentrum, fortsett 4-5 min og ta av der det står
      Skalland, opp til Skallandslia. Hold til venstre i første veiskille og fortsett
      ca 7 min. Underveis (i disse 7 min) kommer du til en bom, og du må da ringe
      meg for å åpne den. Etterhvert når man nærmer seg toppen av fjellet ser man
      skiltet til høyre inn til Bjørnerud. Husk bompenger (
    translated_text: Drive through downtown Eggedal, continue for 4–5 minutes, and
      turn off at the sign for Skalland, heading up to Skallandslia. Keep left at
      the first fork in the road and continue for about 7 minutes. Along the way (during
      these 7 minutes), you’ll come to a gate, and you’ll need to call me to open
      it. As you approach the top of the mountain, you’ll see the sign on the right
      pointing to Bjørnerud. Remember to pay the toll (
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  41bc888c142e1986704185f47ec49dfabf2e874684e2a0e7f23b1424e2031a1f:
    source_text: se under
    translated_text: see below
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  457848a5a196916275aba00f3e1fc0426dedaf8c90b322a5b5402bffdacdc0ff:
    source_text: for detaljer)! 150m før veien slutter i et hyttetur finner du en
      stor parkeringsplass som er åpen for alle. Posisjon ser du på kartsiden lenket
      over.
    translated_text: "(for details)! About 150 meters before the road ends at a cabin
      area, you'll find a large parking lot that's open to everyone. You can see the
      location on the map linked above."
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  4369d5636d691ae793e308650a7c1c39d85db7aa8a49e74a6f5dda21d45ac0d2:
    source_text: Stien starter 100m videre innover, rett før veien avslutter i et
      hyttetun, og turen inn tar 45 min i godt tempo på stiene, omtrent samme vinterstid,
      men rundt en time med barn eller mye oppakning. Man jogger de 2,8 km ned til
      bilen på under tyve min uten oppakning.
    translated_text: The trail starts 100 meters further in, just before the road
      ends at a cluster of cabins, and the hike in takes 45 minutes at a brisk pace
      on the trails—roughly the same in winter—but about an hour with children or
      a heavy pack. You can jog the 2.8 km back down to the car in under twenty minutes
      without a pack.
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  c53adba3c14f1b8742e8daa3ce356704c9beea99f900a0e609fe2e1a9db8a972:
    source_text: 'En hvilken som helst bil holder for å komme seg opp til parkeringsplassen
      vi har på fjellet: du trenger ingen heftig SUV, men vinterstid er det greit
      å ha hurtigkjetting i bakhånd, for det kan bli veldig glatt og/eller påskeslush!
      Fra parkeringsplassen tar det et kvarter å kjøre ned til bygda der det er en
      stor SPAR-butikk.'
    translated_text: 'Any car will do to get up to our parking lot in the mountains:
      you don’t need a powerful SUV, but in winter it’s a good idea to have snow chains
      on hand, as it can get very slippery and/or there can be slush! From the parking
      lot, it takes about 15 minutes to drive down to the village, where there is
      a large SPAR store.'
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  dd8575143b62d6e6dc911255ff208f7e8b6c85c27dc6299f0e78c58b531151c8:
    source_text: 'Husk å ta det rolig nedover veiene vinterstid: jeg kjenner veiene
      godt, men har likevel havnet i et tre i en skråning under en “whiteout” der
      jeg plutselig ikke så veien og det lå tørr snø oppå is. Jeg var heldig, men
      det trenger ikke gjelde nestemann.'
    translated_text: 'Remember to take it easy on the roads in winter: I know the
      roads well, but I still ended up crashing into a tree on a slope during a “whiteout”
      when I suddenly couldn’t see the road and there was dry snow on top of ice.
      I was lucky, but the same might not be true for the next person.'
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  246ba22c60ee476124e993859a4d886c59943a07fc3a4d8d1ac6b9a934e437b0:
    source_text: P.S. Viking/Redgo bruker ca 60-120 minutter fra du ringer til de
      er der. Det vet jeg av erfaring ;)
    translated_text: P.S. Viking/Redgo takes about 60–120 minutes from the time you
      call until they arrive. I know that from experience ;)
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  acbf7210e702d9e81f2fb565d4d9fdf62bc64d1c6fc4643e54fcf0ab6796b478:
    source_text: Høsten 2023 kom det en bom i Skallandslia som kun kan åpnes av registrerte
      brukere. Du må altså avtale med meg (på telefon/via sms) at jeg skal være standby
      på telefon på et omtrentlig tidspunkt i løpet av kvelden så jeg kan åpne bommen.
    translated_text: In the fall of 2023, a gate was installed in Skallandslia that
      can only be opened by registered users. This means you’ll need to contact me
      (by phone or text message) to let me know that I should be on standby by phone
      at an approximate time during the evening so I can open the gate.
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  9a9c6f0bc8943c18ea82557e3e9d973ee896c3c8ce1656423159cb827b625883:
    source_text: Jeg jobber med å ordne et alternativ for å automatisere dette og
      fjerne meg fra ligningen, men det er ikke klart per januar 2024.
    translated_text: I'm working on setting up a way to automate this and take myself
      out of the equation, but it won't be ready by January 2024.
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  1baeefdb454966afdc4148b3a6ea0340c3368b4cf9f4a3d92d0cee34d522348b:
    source_text: Når du tar av fra Skallandsveien nesten helt oppå fjellet kjører
      du inn mot
    translated_text: When you turn off Skallandsveien near the top of the mountain,
      you drive toward
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  fb7a91306c0aa1753c63b7ddd98c37e1da6a054e16ac5e63c37c69f5e474d496:
    source_text: Bjørnerudseter
    translated_text: Bjørnerudseter
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  2599f34c462f4923a56847b4c96a6b915c410e9cd640df308de3807d7fd653b7:
    source_text: ". Om du har GPS kan du plotte inn Bjørnerudseterveien 174 (felles
      parkeringsplass). Etter ca 200 m vil du se et stort oppslag på høyre side om
      bompenger med en postkasse under. Det koster 45 kr kontant og man fyller ut
      et gjennomslagspapir og legger det og pengene i kassa. Eventuelt man kan bruke
      Vipps og sende penger til telefon 95488502 med registreringsnummeret i detaljer-feltet.
      Gjør det gjerne på forhånd, før du setter deg i byen og lett å glemme - det
      sjekkes veldig hyppig!"
    translated_text: ". If you have GPS, you can enter Bjørnerudseterveien 174 (shared
      parking lot). After about 200 meters, you’ll see a large sign on the right side
      regarding tolls, with a mailbox underneath. It costs 45 kr in cash; fill out
      the carbon copy form and place it along with the money in the box. Alternatively,
      you can use Vipps and send money to phone number 95488502, entering the registration
      number in the details field. Be sure to do this in advance, before you head
      into town—it’s easy to forget, and they check very frequently!"
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  c548ccf93df95451fe8408e0cbd2501f44bf66d52d6561f37c818c9d7e0397a0:
    source_text: Så langt inn på fjellet har man ikke alt av byens komfort, så man
      må være litt selvhjulpen, men det er ingenting som er vanskelig. Jeg har laget
      et instruksjonshefte hytta som har detaljer om alt. Du kan lese det
    translated_text: This far out in the mountains, you don't have all the comforts
      of the city, so you have to be a bit self-sufficient, but nothing is difficult.
      I've put together an instruction booklet for the cabin that has details on everything.
      You can read it
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  775c853aadf367bf606ddf5927a7e769c6416cc68dfbe8def3ee18c598ecaad7:
    source_text: ", men jeg har også skrevet det ut og lagt det på hytta ;)"
    translated_text: ", but I've also printed it out and put it up at the cabin ;)"
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  d911e1aa8116b3ee8c3b3adc53c7606dd52d408116ef756807dc0e196f1d7b6c:
    source_text: Strømmen slås på på hovedbryter på strømpanelet når du har kommet
      inn forbi inngangspartiet. Trenger du 220V til støvsuging eller TV er det en
      omformer du kan skru på på hemsen til høyre for stigen der batterier og regulatorer
      finnes. 220V-uttaket er i stua under tv-en. Alle andre uttak er 12V DC.
    translated_text: The power is turned on at the main switch on the electrical panel
      once you’ve passed through the entrance. If you need 220V for a vacuum cleaner
      or TV, there is an inverter you can turn on in the loft to the right of the
      ladder, where the batteries and regulators are located. The 220V outlet is in
      the living room below the TV. All other outlets are 12V DC.
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  73332fe03a193ee31c781afbc2de908d1f935ae5a024c6fb3059d3a82dee100e:
    source_text: Parafinkaminen (Wallas) kan stå på under hele oppholdet (i hvert
      fall høst/vinter) - bare trykk på knappen så fort du har kommet fram og skru
      av når du stenger hytta. Det sørger for at det ikke er kaldt om morgenene.
    translated_text: The paraffin heater (Wallas) can stay on throughout your stay
      (at least in the fall and winter)—just press the button as soon as you arrive
      and turn it off when you leave the cabin. This ensures that it won’t be cold
      in the mornings.
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  87d3a888386a600d8b62387e3ee2620910eef8d4a8be3e60efc3bfa2f1c4cb4c:
    source_text: Gassovnene gir rask varme når man kommer til kald hytte vinterstid.
      Dra dem ut i stua og sett dem på med en gang. Etterhvert vil varmen fra de trefyrte
      ovnene bidra og gi god lunk. Fint også å bruke gassovnene på soverommene for
      å gi litt lunk i madrassene om det er vinterstid. Det tar et døgn med fyring
      vinterstid før varmen sitter i veggene, men etter det holder hytta veldig godt
      på den (så lenge det ikke suges kald luft inn via åpne ventiler!).
    translated_text: Gas heaters provide quick warmth when you arrive at a cold cabin
      in the winter. Bring them into the living room and turn them on right away.
      Eventually, the heat from the wood-burning stoves will kick in and provide a
      nice, cozy warmth. It’s also a good idea to use the gas heaters in the bedrooms
      to warm up the mattresses a bit during the winter. It takes about a day of burning
      in the winter before the heat settles into the walls, but after that, the cabin
      retains the heat very well (as long as cold air isn’t being sucked in through
      open vents!).
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  d0f51f893be33706e4d5579290abb86cbe16b803288b04c6eae0311449c032d8:
    source_text: Opptil 4 mobiler kan lades fra laderen i stua ved CD-spilleren. Mikro-usb,
      USB-C og lightningkabel er på plass.
    translated_text: Up to four phones can be charged using the charger in the living
      room next to the CD player. Micro-USB, USB-C, and Lightning cables are provided.
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  98a7cde3819b5cd3dadbd67f885108380a1feb3da09e4c259179bbdabf4e3a44:
    source_text: For å få vann må man skru på pumpen. Bryteren er over vasken, og
      man bør la vannet renne et halvt minutt første gangen siden det har stått lenge
      og kan komme litt grums. Pumpen bør skrus av etter hver gang, ellers kan den
      fort stå og dure.
    translated_text: To get water, you need to turn on the pump. The switch is above
      the sink, and you should let the water run for about thirty seconds the first
      time, since it’s been sitting for a while and may be a little cloudy. The pump
      should be turned off after each use; otherwise, it can quickly start running
      continuously.
    format: text
    updated_at: '2026-03-31T08:37:16Z'
  296ae334da7168fd6a7d1230006a7b2fbb5b54695645b0481b2e791a71762a00:
    source_text: Vi har et aggregat som står utenfor østveggen. Siden vi har så kraftig
      solcelleanlegg har det ikke vært nødvendig å bruke dette, selv i de mørkeste
      vintermånedene, siden vi fikk så mye batterier i 2019. Det holder i praksis
      en uke i gråvær uten lading. Om man fjerner snø på taket pleier det å lade seg
      inn selv i desember.
    translated_text: We have a generator located outside the east wall. Since we have
      such a powerful solar panel system, we haven’t needed to use it—even during
      the darkest winter months—ever since we installed so many batteries in 2019.
      In practice, it lasts a week in cloudy weather without recharging. If you clear
      the snow off the roof, it usually recharges itself even in December.
    format: text
    updated_at: '2026-03-31T08:37:17Z'
  ff76661e4d7bc886b199b06f5cfff78df2c6e97be9e6476f360c4223971104de:
    source_text: 'Angående cd-spilleren: det er egentlig en bilradio som har minijack-inngang.
      Jeg har lagt fram minijack-kabel med overganger for både Android og iOS (Lightning),
      så det er bare å laste ned offline-lister på forhånd, om du ikke vil høre alle
      cd-ene til fatteren fra nittitallet :-) Lyden er høy og god nok for en bra fest,
      men prøv å ikke spreng høyttalerne.'
    translated_text: 'Regarding the CD player: it’s actually a car stereo with a 3.5mm
      jack input. I’ve provided a mini-jack cable with adapters for both Android and
      iOS (Lightning), so just download your offline playlists in advance if you don’t
      want to listen to all of my dad’s CDs from the ’90s :-) The sound is loud and
      good enough for a great party, but try not to blow out the speakers.'
    format: text
    updated_at: '2026-03-31T08:37:17Z'
  27753a3936b5d62a74c0edc363b60d9a3cbd1586323fd6eddb75823029d1a429:
    source_text: Jeg har også delt
    translated_text: I've also shared
    format: text
    updated_at: '2026-03-31T08:37:17Z'
  a204ae0da2ee51a9daf96734820b62599d27522b4472a5f4c87cce4b6f0ed72c:
    source_text: en mappe som inneholder mer informasjon
    translated_text: a folder containing more information
    format: text
    updated_at: '2026-03-31T08:37:17Z'
  bad3459aac634c6e2ee1cbd22b97bbb0eef0a40154c86c216b1fede2c9b9bac4:
    source_text: ", som f.eks. turforslag, kart og bruksanvisninger til alt teknisk
      utstyr. Sistnevnte er om man måtte komme over noen problemer mens man er på
      hytta, men det er for spesielt interesserte ;) Nå om dagen er det såpass godt
      med lade- og batterikapasitet at aggregatet har stått i ro noen år!"
    translated_text: ", such as suggested hikes, maps, and user manuals for all technical
      equipment. The latter is in case you run into any problems while at the cabin,
      but that’s for those with a special interest ;) These days, charging and battery
      capacity are so good that the generator hasn’t been used in years!"
    format: text
    updated_at: '2026-03-31T08:37:17Z'
  51306b16d4da8d78121a3041347503e63914852496bde0168facc7cd3f7adaf4:
    source_text: Det er ni sengeplasser på hytta. Ett “master bedroom” med en dobbeltseng,
      et gjesterom med tre senger, en hems ved pipa med to madrasser og en adskilt
      hems med ytterligere to madrasser (ca 1m brede).
    translated_text: The cabin sleeps nine. There is one master bedroom with a double
      bed, a guest room with three beds, a loft by the chimney with two mattresses,
      and a separate loft with two additional mattresses (approx. 1 m wide).
    format: text
    updated_at: '2026-03-31T08:37:17Z'
  5b99fd2174d8f1f6c2fbb0fae05c834d2e35d8f3c6157aeb62058060aed2a953:
    source_text: Det er dessverre vanskelig for oss å tilby ferdig oppredde senger
      av logistikkgrunner, så må man ta med seg sengetøy/lakenpose og håndklæder.
      Anbefaler en liten håndklut for kroppsvask og et lite hånklæde til tørking.
      Det finnes backupløsninger der oppe om man skulle ha glemt noe. Bare ring oss
      så ordner vi det :)
    translated_text: Unfortunately, for logistical reasons, we are unable to provide
      made-up beds, so you’ll need to bring your own bedding (sheets and a duvet cover)
      and towels. We recommend a small washcloth for washing and a small towel for
      drying off. There are backup options available up there in case you forget anything.
      Just give us a call and we’ll take care of it :)
    format: text
    updated_at: '2026-03-31T08:37:17Z'
  6aa4884f1e10e7faebfadead08f79ea0979038bbf987245fccf2d55dd7546698:
