      være “det riktige”/mest økonomiske valget om bare et par år. Da ville det kanskje
      gi mening å oppgradere til 48V i samme slengen. Samtidig hadde jeg to AGM batterier
      som var nesten nye - det ville være dumt å bare kaste dem, så derfor så jeg
      på muligheter for å bruke det jeg hadde og skaffe kapasiteten jeg trengte på
      et rimelig vis. Ett nytt PVX-2580 koster ca 12000 kr (10K på tilbud). Jeg fikk
      kjøpt 3 stk til 9000kr med en snittkapasitet på 80%. Med andre ord nesten 70%
      rabatt på Ah/kr. Totalt kom"
    translated_text: ", even though in practice you only need half as much capacity
      with lithium since they can be fully discharged. I realized, however, that lithium
      batteries will be “the right”/most economical choice in just a couple of years.
      By then, it might make sense to upgrade to 48V while I’m at it. At the same
      time, I had two AGM batteries that were practically new—it would be a waste
      to just throw them away, so I looked into ways to use what I had and get the
      capacity I needed in a cost-effective way. A new PVX-2580 costs about 12,000
      kr (10K on sale). I managed to buy 3 units for 9,000 kr with an average capacity
      of 80%. In other words, almost a 70% discount on Ah/kr. In total, it came to"
    format: text
