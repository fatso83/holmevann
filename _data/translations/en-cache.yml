      kortspill. Det er mest for aldersspennet 8-80, men vi har i alle fall UNO Junior
      (3+ år).
    translated_text: There are drawing supplies, train sets, and LEGO at the cabin.
      There are also three UFO sleds stored under the cabin. In addition, we have
