  57ce3dbaa2a8a89e8af98fb822af58304eab12c4429f5027a0b2b5eb35277452:
    source_text: Du må ta med mat, dynetrekk og laken (ev. bare lakenpose) og håndklede.
      Anbefaler også ett lite hånd-håndklæde for kroppsvask i tillegg til det du tørker
      kroppen med. Vi har forsåvidt mange (9) små hånd-håndklæder, og du kan gjerne
      benytte deg av ett av dem, forutsatt at du kokvasker det ved avreise!
    translated_text: You must bring your own food, duvet covers, sheets (or just a
      fitted sheet), and towels. We also recommend bringing a small washcloth for
      washing yourself, in addition to the towel you use to dry off. We do have plenty
      (9) of small washcloths, and you’re welcome to use one of them, provided you
      wash it thoroughly before departure!
