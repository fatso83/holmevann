  65c7b4f72b60d5f69709335b240fd6ca713c76e4e7803e9cb6eb4831f8dcb77e:
    source_text: Det er mye enklere med bil, men det går an å bruke kollektivtransport.
      Anbefaler tog+buss fra Oslo-Hønefoss-Åmot-Eggedal, ca 3t (vs 2t med bil). Jeg
      ville tatt taxi opp på fjellet til parkeringsplassen for å spare meg for 1,5-2t
      gåing. Er dere flere ville jeg bestilt minibusstaxi på forhånd (ca 500kr).
    translated_text: It’s much easier by car, but you can use public transportation.
      I recommend taking the train and bus from Oslo to Hønefoss to Åmot to Eggedal—about
      3 hours (vs. 2 hours by car). I would take a taxi up the mountain to the parking
      lot to save myself a 1.5–2-hour walk. If there are several of you, I would book
      a minibus taxi in advance (approx. 500 NOK).
    format: text
