  61509cdb2f6ba97cfb53032c9223c484c0bc44a1a88c28cf0284d6f7a9141b96:
    source_text: Denne helgen har innebåret dype daler og høye tinder - både bokstavelig
      og i oversatt betydning. Lørdagen brukte jeg sammen med Fredrik på å fikse ting
      inne og ute, og vi brukte 5t på å finne ut hvordan vi skulle få fylt tanken.
      Da vi omsider hadde greid å fylle tanken fant jeg ut at det ikke kom noe vann
      fra pumpa. Kun luft … Det virker da som om det er en utett kobling eller rør
      et eller annet sted. Ganske kjipt.
    translated_text: This weekend has had its ups and downs—both literally and figuratively.
      I spent Saturday with Fredrik fixing things inside and out, and it took us five
      hours to figure out how to fill the tank. When we finally managed to fill the
      tank, I realized that no water was coming out of the pump. Just air… It seems
      like there’s a leaky connection or pipe somewhere. Pretty annoying.
    format: text
    updated_at: '2026-03-31T08:36:48Z'
  4a4f9da5415ba75b875b45e54b9fbb73f03f45bb360fc025b5facfd328e005d6:
    source_text: Det kan være en ettervirkning av at en av leieboerne i vinter som
      glemte å tømme vannrørene. De var helt frosset neste gang jeg kom opp og det
      kan jo selvsagt ha skadet både rør og pumpe. Og i vinter fikk vi for første
      gang problemer med at vannpumpa måtte “luftes ut” før den trakk, noe som kanskje
      var et forvarsel om hva som kom.
    translated_text: It may be a result of one of the tenants this past winter forgetting
      to drain the water pipes. They were completely frozen the next time I went up,
      and that could, of course, have damaged both the pipes and the pump. And this
      winter, for the first time, we had problems where the water pump had to be “bled”
      before it would start, which may have been a warning sign of what was to come.
    format: text
    updated_at: '2026-03-31T08:36:48Z'
  4bd5ed3ecebe5ce65d313018d98892f4313388cfb98d3986b07f4bf367cc3b91:
    source_text: Uansett er det ikke lett å skaffe rørlegger inne på vidda, så dette
      må muligens vente til vinteren. Fram til da må folk belage seg på å hente vann
      i bøtter :(
    translated_text: In any case, it’s not easy to find a plumber out here on the
      plateau, so this might have to wait until winter. Until then, people will have
      to make do with fetching water in buckets :(
    format: text
