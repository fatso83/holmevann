  3c6024ef6a6daec96158ee56790a6ad0af40efc5d1690196a3e494b074e71487:
    source_text: ") o.l. har jeg kjøpte meg en spenningsregulator som står på hytta.
      Det er en svart boks man kan koble mellom strømmen fra hytta og kabelen. Da
      kan man f.eks. senke spenningen til 100V som vil senke forbruket til 1/4 til
      det har stabilisert seg etter et halvt minutt og så gradvis skru det opp til
      220V over 20 sekunder-ish. Den fungerer ikke på pumpa - kan ødelegge den (induktiv
      vs resistiv last eller noe slikt …)."
    translated_text: ") etc., I bought a voltage regulator that I keep at the cabin.
      It’s a black box that you can connect between the cabin’s power supply and the
      cable. Then you can, for example, lower the voltage to 100V, which will reduce
      power consumption to 1/4 until it stabilizes after about half a minute, and
      then gradually turn it up to 220V over about 20 seconds. It doesn’t work on
      the pump—it could damage it (inductive vs. resistive load or something like
      that…)."
    format: text
