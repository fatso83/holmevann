    translated_text: A problem arises
    format: text
    updated_at: '2026-03-31T08:36:59Z'
  21c0121de075e6e3d2c2c0a8deb4e8f4c4d761d88ec43590cc8aefe70698b686:
    source_text: Så kom vinteren 2023. Testet hytta et par ganger og syntes det var
      merkelig kaldt til tider (når det blåste). Da hadde jeg også fått beskjed fra
      noen leietagere (i oktober/nov!) om at de bare hadde greid å holde stua varm.
      Ganske snodig, når jeg egentlig skulle ha en mye bedre isolert hytte? Polygon
      forsikret meg om at det ville nok bli bedre bare jeg fikk på torva, uten at
      jeg skjønte hvordan det kunne stemme.
    translated_text: Then winter 2023 arrived. I tested the cabin a couple of times
      and thought it felt strangely cold at times (when it was windy). By then, I’d
      also heard from some renters (in October/November!) that they’d only managed
      to keep the living room warm. Pretty odd, considering I was supposed to have
      a much better-insulated cabin? Polygon assured me that things would probably
      improve once I got the turf in place, though I didn’t understand how that could
      be true.
    format: text
    updated_at: '2026-03-31T08:36:59Z'
  c62ff37db4e33223fff0e8df3b0d9c796e9423c943299425ad7d89af5d3f1bf5:
