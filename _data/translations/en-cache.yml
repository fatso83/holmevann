  fd9c514360efd36f8368561d3ba44a5521d5426e5edc90b36c07c318e1d71e50:
    source_text: 'Det viser seg at dassen ganske enkelt var feilinstallert av installatøren.
      Cinderella kommer i flere utgaver, og 230V varianten har et kraftigere luftesystem
      enn gassvarianten som kun har en liten vifte som går på 12V. Produsenten har
      derfor en installasjonsveiledning som krever at man følger installasjonen til
      punkt og prikke, og den avviker litt fra “standardvarianten” for 230V:'
    translated_text: 'It turns out that the toilet was simply installed incorrectly
      by the installer. The Cinderella comes in several versions, and the 230V model
      has a more powerful ventilation system than the gas model, which only has a
      small 12V fan. The manufacturer therefore provides installation instructions
      that require you to follow the installation to the letter, and these differ
      slightly from the “standard version” for 230V:'
    format: text
