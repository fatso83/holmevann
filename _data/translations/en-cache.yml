  7a194e00a4595c15f2490f46b884d97601e180883187bd3402f26265985d525d:
    source_text: Sommerstid er min anbefaling, om du tar Sigdalsruta, å stoppe på
      Sandsbråten. Der har du innlandsnorges fineste badestrand (ofte deilig vanntemperatur)
      og god thaimat fra Pookys rett ved siden. Et svalende bad fulgt av nydelig uteservering
      med kongeutsikt over elva kan vanskelig slås :)
    translated_text: In the summer, if you're taking the Sigdalsruta, I recommend
      stopping at Sandsbråten. There you'll find the best swimming beach in inland
      Norway (often with lovely water temperatures) and great Thai food from Pookys
      right next door. A refreshing swim followed by a lovely meal on the patio with
      a spectacular view of the river is hard to beat :)
    format: text
