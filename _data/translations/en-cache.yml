  5d52fb4d56ac4aec47a4eca433574b3ec152ab3ab4121c988f41fe44df2b74dc:
    source_text: Nuvel, det kunne gått verre. Selv om torva, asfaltpappen og knotteplasten
      gikk føyken, pipa ble ødelagt, solcellepanelene ble kastet av, båten ødelagt
      og det ble mye styr så var nå
    translated_text: Well, it could have been worse. Even though the turf, the asphalt
      board, and the corrugated plastic were blown away, the chimney was destroyed,
      the solar panels were knocked off, the boat was wrecked, and there was a lot
      of commotion, now
    format: text
