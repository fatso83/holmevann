  30dc9d5456c755a567a6a62a1818d7c4a699c851aa3aaf6bf00635fdb440efa4:
    source_text: 'Hytta gikk det ikke så bra med heller: torvholdstokkene ble revet
      av, med følgen av at torvtaket ble løftet undenfra som et seil og kastet over
      på andre siden av hytta. Så ut som en atombombe hadde slått ned, men det gikk
      bedre med oss enn med nabohytta som ble flyttet en halvmeter av grunnmuren og
      måtte rives! Det resulterte i en artikkel i'
    translated_text: 'The cabin didn’t fare much better either: the roof battens were
      torn off, causing the turf roof to be lifted from below like a sail and thrown
      over to the other side of the cabin. It looked like an atomic bomb had struck,
      but we fared better than the neighboring cabin, which was shifted half a meter
      from its foundation and had to be torn down! This resulted in an article in'
    format: text
    updated_at: '2026-03-31T08:36:55Z'
