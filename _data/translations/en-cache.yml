  '05905cbe725abd5b0c579cc02dc1a8e33a791481eb945ff0718aebf702fbab17':
    source_text: Tenkte jeg skulle skrive litt om solcellepanelprosjektet, for det
      er interessant for andre av den grunn at det liksom ikke skulle være mulig å
      ha paneler på torvtak, fordi paneler vanligvis må festes i taket med skruer.
      På torvtak skal man for all del unngå å skru noe fast, for da penetrererer man
      det laget som er ment å holde vannet unna.
    translated_text: I thought I’d write a little about the solar panel project, because
      it’s interesting to others for the simple reason that it supposedly isn’t possible
      to install panels on a thatched roof—since panels usually have to be secured
      to the roof with screws. On a thatched roof, you should absolutely avoid screwing
      anything in, because that would penetrate the layer intended to keep water out.
    format: text
    updated_at: '2026-03-31T08:36:51Z'
  7818fbac4a9f8e37914e8be8f3d3bbd1059df956261a753d1f2429cae30d72f5:
    source_text: Det jeg har gjort er å lage en variant som unngår dette ved å bygge
      på et prinsipp fra snøfangere. Jeg
    translated_text: What I've done is create a version that avoids this by drawing
      on a principle used in snow guards. I
    format: text
    updated_at: '2026-03-31T08:36:51Z'
  d1d3854b5821013ec78613b1b8eedfbefb12ad4758fa964ea30e6bd6c70a136c:
